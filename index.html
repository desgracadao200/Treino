<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Treino — Powerlifting</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#0c0c0e;color:#f2f0ea;font-family:'Oswald',sans-serif;min-height:100vh;}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;}
#loading .spin{width:40px;height:40px;border:3px solid #2e2e38;border-top-color:#e8a534;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:14px;color:#8c8a85;letter-spacing:2px;text-transform:uppercase;}
#error{display:none;padding:24px;background:#1a1a20;border:1px solid #d6493b;border-radius:12px;margin:20px;color:#f2f0ea;font-size:13px;line-height:1.6;}
button{font-family:'Oswald',sans-serif;touch-action:manipulation;-webkit-tap-highlight-color:transparent;cursor:pointer;border:none;outline:none;}
input{font-family:'JetBrains Mono',monospace;touch-action:manipulation;outline:none;border:none;}
</style>
</head>
<body>

<!-- Mostrado enquanto o Babel/React carrega -->
<div id="loading">
  <div class="spin"></div>
  <p>Carregando treino...</p>
</div>

<!-- Mostrado se der erro -->
<div id="error"></div>

<!-- Container do app -->
<div id="root" style="display:none"></div>

<script>
window.onerror = function(msg, src, line, col, err) {
  document.getElementById('loading').style.display = 'none';
  var el = document.getElementById('error');
  el.style.display = 'block';
  el.innerHTML = '<b style="color:#d6493b">Erro ao carregar o app:</b><br><br>' + msg + '<br><small style="color:#8c8a85">Linha ' + line + '</small>';
};
</script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const PROG = {
  squat:{
    heavy:{acum:{pct:75,sets:4,reps:5,rpe:"7"},int1:{pct:80,sets:4,reps:4,rpe:"7-8"},int2:{pct:83,sets:4,reps:3,rpe:"8"},pico:{pct:88,sets:4,reps:2,rpe:"8-9"},deload:{pct:62,sets:3,reps:5,rpe:"6"},reinicio:{pct:77,sets:4,reps:5,rpe:"7"}},
    volume:{pct:72,sets:4,reps:4,rpe:"7"}
  },
  bench:{
    heavy:{acum:{pct:75,sets:4,reps:5,rpe:"7"},int1:{pct:80,sets:4,reps:4,rpe:"7-8"},int2:{pct:83,sets:4,reps:3,rpe:"8"},pico:{pct:88,sets:4,reps:2,rpe:"8-9"},deload:{pct:62,sets:3,reps:5,rpe:"6"},reinicio:{pct:77,sets:4,reps:5,rpe:"7"}},
    volume:{pct:73,sets:5,reps:5,rpe:"7"}
  },
  dead:{
    heavy:{acum:{pct:75,sets:3,reps:4,rpe:"7"},int1:{pct:80,sets:3,reps:3,rpe:"7-8"},int2:{pct:83,sets:3,reps:3,rpe:"8"},pico:{pct:87,sets:3,reps:2,rpe:"8-9"},deload:{pct:62,sets:2,reps:4,rpe:"6"},reinicio:{pct:77,sets:3,reps:4,rpe:"7"}}
  }
};

const WU = {
  ter:[{lift:"squat",title:"Agachamento",steps:[{lb:"Barra",kg:20,reps:"8"},{pct:40,reps:"5"},{pct:55,reps:"3"},{pct:70,reps:"2"},{pct:85,reps:"1"}]}],
  qui:[{lift:"bench",title:"Supino",steps:[{lb:"Barra",kg:20,reps:"10"},{pct:40,reps:"8"},{pct:60,reps:"5"},{pct:70,reps:"2"}]}],
  sex:[{lift:"squat",title:"Agach. Pausa",note:"pausa 2s",steps:[{lb:"Barra",kg:20,reps:"8"},{pct:40,reps:"5"},{pct:55,reps:"3"},{pct:68,reps:"2"}]}],
  sab:[
    {lift:"bench",title:"Supino",steps:[{lb:"Barra",kg:20,reps:"10"},{pct:40,reps:"8"},{pct:60,reps:"5"},{pct:75,reps:"2"},{pct:85,reps:"1"}]},
    {lift:"dead",title:"Terra",steps:[{lb:"Barra",kg:20,reps:"5"},{pct:40,reps:"5"},{pct:60,reps:"3"},{pct:75,reps:"2"},{pct:85,reps:"1"}]}
  ]
};

const DAYS = {
  ter:{lb:"Terça",title:"Heavy Lower",sub:"Agachamento pesado + posterior",cls:"heavy",ex:[
    {id:"t1",name:"Agachamento (pesado)",main:{lift:"squat",dt:"heavy"},subs:["Hack squat","High bar","Smith"]},
    {id:"t2",name:"Agachamento pausa (2s)",sets:3,reps:3,rpe:"7",subs:["Box squat","Frontal","Smith pausa"]},
    {id:"t3",name:"Stiff / RDL",sets:3,reps:"6-8",rpe:"7-8",subs:["Good morning","Mesa flexora","RDL halteres"]},
    {id:"t4",name:"Cadeira flexora / Nordic",sets:3,reps:"8-10",rpe:"8",subs:["Mesa flexora","Leg curl","Nordic assistido"]},
    {id:"t5",name:"Abdômen (prancha)",sets:3,reps:"30s",rpe:"7",subs:["Ab wheel","Elevação de pernas","Prancha lateral"]},
  ]},
  qua:{lb:"Quarta",title:"Recuperação",sub:"Cardio leve + mobilidade",cls:"rec",recovery:true,ex:[
    {rt:"Cardio leve — esteira ou bike",rs:"20–30 min · FC 120–140 bpm"},
    {rt:"Mobilidade — quadril, tornozelo, ombro",rs:"10 min no que estiver mais travado"},
    {rt:"Prancha (opcional)",rs:"3 × 30–45s"},
  ]},
  qui:{lb:"Quinta",title:"Volume Upper",sub:"Supino volume + acessórios",cls:"volume",ex:[
    {id:"q1",name:"Supino reto (volume)",main:{lift:"bench",dt:"volume"},subs:["Supino máquina","Supino halteres","Smith"]},
    {id:"q2",name:"Supino fechado",sets:3,reps:"6-8",rpe:"8",subs:["Supino fechado Smith","Mergulho","Tríceps testa"]},
    {id:"q3",name:"Remada barra T / apoiada",sets:4,reps:"8-10",rpe:"8",subs:["Remada cavalinho","Remada máquina","Remada halter","Puxada"]},
    {id:"q4",name:"Desenvolvimento halteres",sets:3,reps:"8-10",rpe:"8",subs:["Desenvolvimento máquina","Militar barra","Arnold press"]},
    {id:"q5",name:"Tríceps overhead",sets:3,reps:"10-12",rpe:"9",subs:["Tríceps corda","Tríceps francês","Mergulho"]},
    {id:"q6",name:"Face pull",sets:3,reps:"15-20",rpe:"7",subs:["Crucifixo invertido","Band pull-apart","Peck-deck"]},
  ]},
  sex:{lb:"Sexta",title:"Volume Lower",sub:"Agachamento pausa + acessórios",cls:"volume",ex:[
    {id:"s1",name:"Agachamento pausa (volume)",main:{lift:"squat",dt:"volume"},subs:["Box squat","High bar","Smith"]},
    {id:"s2",name:"Bloco pull / Terra leve",sets:3,reps:5,rpe:"7",subs:["Rack pull","Terra leve","RDL"]},
    {id:"s3",name:"Leg press 45°",sets:3,reps:"8-10",rpe:"8",subs:["Hack squat","Agachamento","Afundo","Leg press horizontal"]},
    {id:"s4",name:"Hyperextension",sets:3,reps:"10-12",rpe:"8",subs:["Good morning","Stiff","Banco romano"]},
    {id:"s5",name:"Abdômen",sets:3,reps:15,rpe:"7",subs:["Prancha","Rotação russa","Ab wheel"]},
  ]},
  sab:{lb:"Sáb",title:"Heavy Upper + Terra",sub:"Supino pesado + Terra pesado",cls:"heavy",ex:[
    {id:"sb1",name:"Supino reto (pesado)",main:{lift:"bench",dt:"heavy"},subs:["Supino máquina","Supino halteres","Smith"]},
    {id:"sb2",name:"Terra convencional (pesado)",main:{lift:"dead",dt:"heavy"},subs:["Terra sumô","Pegada mista"]},
    {id:"sb3",name:"Remada curvada barra",sets:3,reps:"5-6",rpe:"7-8",subs:["Remada máquina","Remada cavalinho","Remada halter"]},
    {id:"sb4",name:"Tríceps mergulho / JM Press",sets:3,reps:"6-8",rpe:"8",subs:["Tríceps corda","Tríceps testa","Supino fechado"]},
    {id:"sb5",name:"Bíceps + antebraço",sets:3,reps:"10-12",rpe:"9",subs:["Rosca direta","Rosca alternada","Rosca martelo","Farmer carry"]},
  ]}
};

const DAY_K=["ter","qua","qui","sex","sab"];
const PH_K=["acum","int1","int2","pico","deload","reinicio"];
const PH_LBL={acum:"Acumul.",int1:"Intens.",int2:"Intens.",pico:"Pico",deload:"Deload",reinicio:"Reinício"};
const PH_WK={acum:"Sem 1",int1:"Sem 2",int2:"Sem 3",pico:"Sem 4",deload:"Sem 5",reinicio:"Sem 6"};
const RM_K={squat:"sq",bench:"bn",dead:"dl"};
const LIFT_NAMES={squat:"Agachamento",bench:"Supino",dead:"Terra"};
const METAS={
  squat:{atual:102.5,recomp:117.5,cheia:130,blocos:[106,110,114,117.5]},
  bench:{atual:85,recomp:91.5,cheia:100,blocos:[87,89,90.5,91.5]},
  dead:{atual:195,recomp:207.5,cheia:217.5,blocos:[199,202,205,207.5]}
};

const G="#e8a534",GD="#a8761f",R="#d6493b",BL="#4d83c4",GR="#5aa55f",PU="#7c5cbf";
const BG="#0c0c0e",BG2="#141418",CARD="#1a1a20",CARD2="#22222a",LN="#2e2e38";
const TX="#f2f0ea",DIM="#8c8a85",FT="#5a5852";
const MN="'JetBrains Mono',monospace";

function r25(x){return Math.round(x/2.5)*2.5;}
function B(ex){return{fontFamily:"'Oswald',sans-serif",touchAction:"manipulation",WebkitTapHighlightColor:"transparent",cursor:"pointer",border:"none",outline:"none",...ex};}
function lsGet(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

function Lbl({c}){
  return(
    <div style={{fontSize:10,letterSpacing:3,textTransform:"uppercase",color:DIM,fontWeight:500,marginBottom:8,display:"flex",alignItems:"center",gap:7}}>
      <span style={{width:14,height:2,background:G,flexShrink:0,display:"block"}}/>
      <span>{c}</span>
    </div>
  );
}

function WuStep({s, rmv}){
  var kg = s.kg !== undefined ? s.kg : (rmv > 0 ? r25(rmv * s.pct / 100) : null);
  return(
    <div style={{display:"flex",alignItems:"center",gap:9,padding:"7px 9px",background:CARD,borderRadius:7,marginBottom:4,border:"1px solid "+LN}}>
      <span style={{fontFamily:MN,fontSize:10,color:FT,minWidth:18}}>ª</span>
      <span style={{fontFamily:MN,fontWeight:800,fontSize:18,color:G,minWidth:55}}>{kg !== null ? kg+"kg" : "—"}</span>
      <span style={{fontFamily:MN,fontWeight:700,fontSize:12,color:TX}}>× {s.reps}</span>
      <span style={{fontSize:10,color:FT,marginLeft:"auto"}}>{s.lb || s.pct+"%"}</span>
    </div>
  );
}

function App(){
  var savedRm = lsGet("pl8_rm");
  var savedSubs = lsGet("pl8_sb");
  var savedHist = lsGet("pl8_ss");
  var savedRmHist = lsGet("pl8_rh");

  var [rm, setRm] = useState(savedRm || {sq:"102.5",bn:"85",dl:"195"});
  var [mode, setMode] = useState("treino");
  var [day, setDay] = useState("ter");
  var [phase, setPhase] = useState("acum");
  var [subs, setSubs] = useState(savedSubs || {});
  var [openS, setOpenS] = useState({});
  var [wuOpen, setWuOpen] = useState(false);
  var [log, setLog] = useState({});
  var [date, setDate] = useState(new Date().toISOString().slice(0,10));
  var [hist, setHist] = useState(savedHist || []);
  var [saveS, setSaveS] = useState("idle");
  var [rmLift, setRmLift] = useState("squat");
  var [rmDate, setRmDate] = useState(new Date().toISOString().slice(0,10));
  var [rmWuOpen, setRmWuOpen] = useState(false);
  var [attempts, setAttempts] = useState([{kg:"",ok:null},{kg:"",ok:null},{kg:"",ok:null}]);
  var [rmHist, setRmHist] = useState(savedRmHist || []);
  var [rmSaveS, setRmSaveS] = useState("idle");
  var [rmUpdated, setRmUpdated] = useState(null);

  function getRmV(lift){var v=parseFloat(rm[RM_K[lift]]);return isNaN(v)?0:v;}

  function comp(lift,dt){
    var rmv=getRmV(lift);
    var heavy=PROG[lift] && PROG[lift].heavy;
    var vol=PROG[lift] && PROG[lift].volume;
    var cfg=dt==="heavy"?(heavy && heavy[phase]):vol;
    if(!cfg) return null;
    return Object.assign({},cfg,{
      kg:rmv>0?r25(rmv*cfg.pct/100):null,
      exact:rmv>0?(rmv*cfg.pct/100).toFixed(1):null,
      fixed:dt==="volume"
    });
  }

  function numSets(e){
    if(e.main){var m=comp(e.main.lift,e.main.dt);return m?m.sets:3;}
    return e.sets||3;
  }
  function tReps(e){
    if(e.main){var m=comp(e.main.lift,e.main.dt);return m?m.reps:"-";}
    return e.reps||"-";
  }
  function getSet(exId,si){var d=log[exId];return(d&&d.sets&&d.sets[si])||{kg:"",reps:""};}
  function getRpeV(exId){return(log[exId]&&log[exId].rpe)||"";}

  function setSetVal(exId,si,field,val){
    setLog(function(p){
      var d=Object.assign({},p[exId]||{sets:[],rpe:""});
      var sets=d.sets?d.sets.slice():[];
      while(sets.length<=si) sets.push({kg:"",reps:""});
      sets[si]=Object.assign({},sets[si]);
      sets[si][field]=val;
      d.sets=sets;
      var next=Object.assign({},p);
      next[exId]=d;
      return next;
    });
  }
  function setRpeV(exId,val){
    setLog(function(p){
      var next=Object.assign({},p);
      next[exId]=Object.assign({},p[exId]||{sets:[],rpe:""},{rpe:val});
      return next;
    });
  }

  function updRM(k,val){var n=Object.assign({},rm);n[k]=val;setRm(n);lsSet("pl8_rm",n);}
  function chDay(d){setDay(d);setOpenS({});setWuOpen(false);setLog({});}
  function togSub(id){setOpenS(function(p){var n=Object.assign({},p);n[id]=!p[id];return n;});}
  function chSub(id,name){var n=Object.assign({},subs);n[id]=name;setSubs(n);lsSet("pl8_sb",n);setOpenS(function(p){var q=Object.assign({},p);q[id]=false;return q;});}

  function doSave(){
    var d=DAYS[day];
    if(d.recovery){flash(setSaveS,"rec");return;}
    if(!date){flash(setSaveS,"err");return;}
    var entries=(d.ex||[]).map(function(e){
      var ns=numSets(e);
      var ld=log[e.id]||{sets:[],rpe:""};
      var sets=[];
      for(var i=0;i<ns;i++) sets.push((ld.sets&&ld.sets[i])||{kg:"",reps:""});
      return{name:subs[e.id]||e.name,sets:sets,rpe:ld.rpe||""};
    });
    var next=hist.concat([{ts:Date.now(),date:date,day:day,phase:phase,entries:entries}]);
    setHist(next);lsSet("pl8_ss",next);setLog({});flash(setSaveS,"done");
  }

  function doRmSave(){
    if(!rmDate){flash(setRmSaveS,"err");return;}
    var bestOk=0;
    attempts.forEach(function(a){
      if(a.ok===true && parseFloat(a.kg)>0){var v=parseFloat(a.kg);if(v>bestOk)bestOk=v;}
    });
    var entry={ts:Date.now(),date:rmDate,lift:rmLift,attempts:attempts.slice(),bestKg:bestOk||null};
    var next=rmHist.concat([entry]);
    setRmHist(next);lsSet("pl8_rh",next);
    if(bestOk>0){
      var key=RM_K[rmLift];
      var newRm=Object.assign({},rm);newRm[key]=String(bestOk);
      setRm(newRm);lsSet("pl8_rm",newRm);setRmUpdated(bestOk);
    }
    flash(setRmSaveS,"done");
  }

  function flash(setter,t){setter(t);setTimeout(function(){setter("idle");},2000);}
  function delHist(ts){var n=hist.filter(function(s){return s.ts!==ts;});setHist(n);lsSet("pl8_ss",n);}
  function delRmHist(ts){var n=rmHist.filter(function(s){return s.ts!==ts;});setRmHist(n);lsSet("pl8_rh",n);}
  function setAtt(i,f,v){setAttempts(function(p){var n=p.slice();n[i]=Object.assign({},n[i]);n[i][f]=v;return n;});}
  function togOk(i,v){setAttempts(function(p){var n=p.slice();n[i]=Object.assign({},n[i]);n[i].ok=n[i].ok===v?null:v;return n;});}

  var d=DAYS[day];
  var hasH=!d.recovery&&d.ex.some(function(e){return e.main&&e.main.dt==="heavy";});
  var wubs=WU[day]||[];
  var rmv=getRmV(rmLift);
  var sugg=[rmv>0?r25(rmv*0.90):null,rmv>0?r25(rmv*0.95):null,rmv>0?r25(rmv)+2.5:null];
  var rmWuS=[{lb:"Barra",kg:20,reps:"10"},{pct:50,reps:"5"},{pct:65,reps:"3"},{pct:75,reps:"2"},{pct:85,reps:"1"},{pct:92,reps:"1"}];
  var bannerBL=d.cls==="heavy"?R:d.cls==="volume"?BL:GR;
  var saveLbl=saveS==="done"?"✓ Salvo!":saveS==="err"?"Preencha a data!":saveS==="rec"?"Dia de recuperação":"Salvar Treino";
  var saveBg=saveS==="done"?GR:saveS!=="idle"?R:G;
  var rmSaveLbl=rmSaveS==="done"?"✓ Resultado Salvo!":rmSaveS==="err"?"Preencha a data!":"Salvar Resultado";
  var rmSaveBg=rmSaveS==="done"?GR:rmSaveS!=="idle"?R:PU;

  return(
    <div style={{background:BG,minHeight:"100vh",fontFamily:"'Oswald',sans-serif",color:TX,backgroundImage:"radial-gradient(circle at 50% 0%, #1c1c22 0%, #0c0c0e 55%)"}}>
      <div style={{maxWidth:520,margin:"0 auto",padding:"0 13px 70px"}}>

        {/* HEADER */}
        <div style={{padding:"20px 0 13px",textAlign:"center",borderBottom:"2px solid "+LN,marginBottom:16}}>
          <div style={{fontSize:10,letterSpacing:5,textTransform:"uppercase",color:G,fontWeight:500}}>Powerlifting · Programa Moderno</div>
          <div style={{fontSize:27,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Meu <span style={{color:G}}>Treino</span></div>
        </div>

        {/* MODO TABS */}
        <div style={{display:"flex",gap:4,background:BG2,border:"1px solid "+LN,borderRadius:11,padding:4,marginBottom:16}}>
          {[["treino","📋 Treino"],["rm","🏆 Teste 1RM"],["metas","🎯 Metas"]].map(function(item){
            var k=item[0],l=item[1];
            var bg=mode===k?(k==="rm"?PU:k==="metas"?GR:G):"transparent";
            var col=mode===k?"#fff":DIM;
            return(
              <button key={k} onClick={function(){setMode(k);}} style={B({flex:1,background:bg,color:col,fontSize:12,fontWeight:600,textTransform:"uppercase",letterSpacing:".3px",padding:"13px 3px",borderRadius:8,minHeight:46})}>{l}</button>
            );
          })}
        </div>

        {/* 1RM */}
        <div style={{marginBottom:16}}>
          <Lbl c="Seu 1RM atual (kg)"/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7}}>
            {[["sq","Squat"],["bn","Bench"],["dl","Deadlift"]].map(function(item){
              var k=item[0],l=item[1];
              return(
                <div key={k} style={{background:CARD,border:"1px solid "+LN,borderRadius:10,padding:"9px 6px",textAlign:"center"}}>
                  <label style={{display:"block",fontSize:10,letterSpacing:1,textTransform:"uppercase",color:DIM,marginBottom:5}}>{l}</label>
                  <input type="number" inputMode="decimal" placeholder="0" value={rm[k]} onChange={function(e){updRM(k,e.target.value);}} style={{width:"100%",background:"transparent",color:G,fontFamily:MN,fontWeight:800,fontSize:21,textAlign:"center"}}/>
                </div>
              );
            })}
          </div>
          {rmUpdated && <div style={{marginTop:8,background:"rgba(124,92,191,.15)",border:"1px solid "+PU,borderRadius:8,padding:"8px 12px",fontSize:12,color:"#d1c4e9",textAlign:"center"}}>✅ 1RM de {LIFT_NAMES[rmLift]} atualizado para <b>{rmUpdated}kg</b>!</div>}
        </div>

        {/* ═══ TREINO ═══ */}
        {mode==="treino" && (
          <div>
            {/* Day tabs */}
            <div style={{marginBottom:15}}>
              <Lbl c="Dia da Semana"/>
              <div style={{display:"flex",gap:4,background:BG2,border:"1px solid "+LN,borderRadius:11,padding:4}}>
                {DAY_K.map(function(k){
                  return(
                    <button key={k} onClick={function(){chDay(k);}} style={B({flex:1,background:day===k?G:"transparent",color:day===k?"#1a1208":DIM,fontSize:13,fontWeight:600,textTransform:"uppercase",letterSpacing:".8px",padding:"13px 2px",borderRadius:8,minHeight:46})}>{DAYS[k].lb}</button>
                  );
                })}
              </div>
            </div>

            {/* Phase */}
            {hasH && (
              <div style={{marginBottom:15}}>
                <Lbl c="Fase do Bloco"/>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
                  {PH_K.map(function(k){
                    var on=phase===k;
                    return(
                      <button key={k} onClick={function(){setPhase(k);}} style={B({background:on?CARD2:CARD,border:"1px solid "+(on?G:LN),borderRadius:9,color:on?TX:DIM,fontSize:11,fontWeight:500,textTransform:"uppercase",padding:"11px 3px",minHeight:50,display:"flex",flexDirection:"column",gap:2,alignItems:"center"})}>
                        <span>{PH_LBL[k]}</span>
                        <span style={{fontSize:9,color:on?G:FT}}>{PH_WK[k]}</span>
                      </button>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Date */}
            <div style={{background:CARD,border:"1px solid "+LN,borderRadius:9,padding:"9px 13px",marginBottom:9,display:"flex",alignItems:"center",gap:9}}>

            {/* Banner */}
            <div style={{borderRadius:9,padding:"11px 13px",marginBottom:10,border:"1px solid "+LN,borderLeft:"4px solid "+bannerBL,background:CARD2}}>
              <div style={{fontSize:16,fontWeight:600,textTransform:"uppercase",letterSpacing:".8px"}}>{d.lb} — {d.title}</div>
              <div style={{fontSize:12,color:DIM,fontWeight:300,marginTop:2}}>{d.sub}</div>
            </div>

            {/* Warmup */}
            {wubs.length > 0 && (
              <div style={{background:BG2,border:"1px solid "+LN,borderRadius:11,marginBottom:10,overflow:"hidden"}}>
                <div onClick={function(){setWuOpen(function(p){return !p;});}} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:13,minHeight:48,cursor:"pointer",touchAction:"manipulation",WebkitTapHighlightColor:"transparent"}}>
                  <span style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:G,fontWeight:500}}>🔥 Aquecimento</span>
                  <span style={{color:DIM,fontSize:12,transition:"transform .2s",transform:wuOpen?"rotate(180deg)":"none",display:"inline-block"}}>▼</span>
                </div>
                {wuOpen && (
                  <div style={{padding:"0 13px 12px"}}>
                    {wubs.map(function(blk,bi){
                      var rv=getRmV(blk.lift);
                      return(
                        <div key={bi}>
                          <div style={{fontSize:10,color:DIM,textTransform:"uppercase",letterSpacing:".8px",margin:"9px 0 5px",fontWeight:500}}>
                            {blk.title}{blk.note && <span style={{color:FT,fontSize:9,marginLeft:5,textTransform:"none",letterSpacing:0}}>({blk.note})</span>}
                          </div>
                          {blk.steps.map(function(s,si){
                            var kg=s.kg!==undefined?s.kg:(rv>0?r25(rv*s.pct/100):null);
                            return(
                              <div key={si} style={{display:"flex",alignItems:"center",gap:9,padding:"7px 9px",background:CARD,borderRadius:7,marginBottom:4,border:"1px solid "+LN}}>
                                <span style={{fontFamily:MN,fontSize:10,color:FT,minWidth:18}}>{si+1}ª</span>
                                <span style={{fontFamily:MN,fontWeight:800,fontSize:18,color:G,minWidth:55}}>{kg!==null?kg+"kg":"—"}</span>
                                <span style={{fontFamily:MN,fontWeight:700,fontSize:12,color:TX}}>× {s.reps}</span>
                                <span style={{fontSize:10,color:FT,marginLeft:"auto"}}>{s.lb||s.pct+"%"}</span>
                              </div>
                            );
                          })}
                        </div>
                      );
                    })}
                    <div style={{fontSize:10,color:FT,marginTop:5,lineHeight:1.4}}>Arredonde 1–2kg conforme as anilhas.</div>
                  </div>
                )}
              </div>
            )}

            {/* Exercícios */}
            {d.recovery ? d.ex.map(function(e,i){
              return(
                <div key={i} style={{background:CARD,border:"1px solid "+LN,borderRadius:9,padding:"12px 13px",marginBottom:7}}>
                  <div style={{fontSize:14,fontWeight:500}}>{e.rt}</div>
                  <div style={{fontSize:11,color:DIM,fontWeight:300,marginTop:2}}>{e.rs}</div>
                </div>
              );
            }) : d.ex.map(function(e){
              var nm=subs[e.id]||e.name;
              var isM=!!e.main;
              var md=isM?comp(e.main.lift,e.main.dt):null;
              var so=!!openS[e.id];
              var cs=subs[e.id]||e.name;
              var ns=numSets(e);
              var tr=tReps(e);
              var allSubs=isM?e.subs:(e.subs||[]);
              return(
                <div key={e.id} style={{background:isM?"linear-gradient(145deg,"+CARD2+","+CARD+")":CARD,border:"1px solid "+(isM?GD:LN),borderRadius:11,padding:"12px 13px",marginBottom:9}}>
                  <div style={{fontSize:15,fontWeight:600,lineHeight:1.2,marginBottom:3}}>{nm}</div>
                  <span style={{fontSize:9,fontWeight:600,letterSpacing:".8px",textTransform:"uppercase",padding:"2px 6px",borderRadius:4,display:"inline-block",background:isM?"rgba(232,165,52,.15)":"rgba(140,138,133,.15)",color:isM?G:DIM}}>{isM?"Principal":"Acessório"}</span>

                  {isM && md ? (
                    <div>
                      <div style={{display:"flex",gap:12,marginTop:8,flexWrap:"wrap",alignItems:"baseline"}}>
                        {md.kg!==null && <span><span style={{fontFamily:MN,fontWeight:800,fontSize:26,color:G,lineHeight:1}}>{md.kg}</span><span style={{fontSize:12,color:DIM}}> kg</span></span>}
                        <span style={{fontFamily:MN,fontWeight:700,fontSize:17,color:TX}}>{md.sets}×{md.reps}</span>
                        <span style={{fontSize:12,color:DIM}}>RPE {md.rpe}</span>
                      </div>
                      <div style={{fontFamily:MN,fontSize:10,color:FT,marginTop:2}}>{md.kg!==null?md.pct+"% do 1RM · exato "+md.exact+"kg":"Preencha o 1RM acima"}</div>
                      {md.fixed && <div style={{fontSize:11,color:G,marginTop:3}}>Volume — carga fixa, dupla progressão</div>}
                    </div>
                  ) : !isM && (
                    <div style={{display:"flex",gap:12,marginTop:8,alignItems:"baseline"}}>
                      <span style={{fontFamily:MN,fontWeight:700,fontSize:17,color:TX}}>{e.sets}×{e.reps}</span>
                      <span style={{fontSize:12,color:DIM}}>RPE {e.rpe}</span>
                    </div>
                  )}

                  {allSubs && allSubs.length > 0 && (
                    <div>
                      <button onClick={function(){togSub(e.id);}} style={B({marginTop:9,fontSize:11,color:BL,border:"1px dashed "+LN,padding:"8px 10px",borderRadius:7,display:"inline-flex",alignItems:"center",gap:4,background:"transparent",minHeight:40})}>🔄 Trocar (sem máquina?)</button>
                      {so && (
                        <div style={{marginTop:7,display:"flex",flexWrap:"wrap",gap:5}}>
                          {[e.name].concat(allSubs).map(function(sn){
                            return(
                              <button key={sn} onClick={function(){chSub(e.id,sn);}} style={B({background:cs===sn?"rgba(77,131,196,.12)":BG2,border:"1px solid "+(cs===sn?BL:LN),color:cs===sn?BL:DIM,fontSize:11,padding:"8px 10px",borderRadius:7,minHeight:38})}>{sn}</button>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  )}

                  {/* Log por série */}
                  <div style={{marginTop:11,paddingTop:11,borderTop:"1px solid "+LN}}>
                    <div style={{display:"grid",gridTemplateColumns:"30px 1fr 1fr",gap:6,marginBottom:5}}>
                      {["Série","Carga (kg)","Reps feitas"].map(function(h){return(<span key={h} style={{fontSize:9,letterSpacing:.5,textTransform:"uppercase",color:FT,textAlign:"center"}}>{h}</span>);  })}
                    </div>
                    {Array.from({length:ns},function(_,si){
                      var s=getSet(e.id,si);
                      return(
                        <div key={si} style={{display:"grid",gridTemplateColumns:"30px 1fr 1fr",gap:6,marginBottom:5,alignItems:"center"}}>
                          <div style={{fontFamily:MN,fontSize:12,fontWeight:700,color:DIM,textAlign:"center",background:BG2,border:"1px solid "+LN,borderRadius:6,height:40,display:"flex",alignItems:"center",justifyContent:"center"}}>{si+1}</div>
                          <div style={{background:BG2,border:"1px solid "+LN,borderRadius:7,height:40,display:"flex",alignItems:"center",padding:"0 8px"}}>
                            <input type="number" inputMode="decimal" placeholder="kg" value={s.kg} onChange={function(ev){setSetVal(e.id,si,"kg",ev.target.value);}} style={{width:"100%",background:"transparent",color:G,fontFamily:MN,fontWeight:700,fontSize:15,textAlign:"center"}}/>
                          </div>
                          <div style={{background:BG2,border:"1px solid "+LN,borderRadius:7,height:40,display:"flex",alignItems:"center",padding:"0 8px"}}>
                            <input type="number" inputMode="decimal" placeholder={""+tr} value={s.reps} onChange={function(ev){setSetVal(e.id,si,"reps",ev.target.value);}} style={{width:"100%",background:"transparent",color:TX,fontFamily:MN,fontWeight:700,fontSize:15,textAlign:"center"}}/>
                          </div>
                        </div>
                      );
                    })}
                    <div style={{display:"flex",alignItems:"center",gap:10,marginTop:6,paddingTop:6,borderTop:"1px dashed "+LN}}>
                      <span style={{fontSize:9,letterSpacing:1,textTransform:"uppercase",color:FT,whiteSpace:"nowrap"}}>RPE geral</span>
                      <div style={{flex:1,background:BG2,border:"1px solid "+LN,borderRadius:7,height:36,display:"flex",alignItems:"center",padding:"0 8px"}}>
                        <input type="number" inputMode="decimal" placeholder="—" value={getRpeV(e.id)} onChange={function(ev){setRpeV(e.id,ev.target.value);}} style={{width:"100%",background:"transparent",color:G,fontFamily:MN,fontWeight:700,fontSize:14,textAlign:"center"}}/>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}

            {!d.recovery && <button onClick={doSave} style={B({width:"100%",marginTop:13,background:saveBg,color:saveS!=="idle"?"#fff":"#1a1208",borderRadius:11,fontSize:16,fontWeight:600,textTransform:"uppercase",letterSpacing:2,padding:"15px",minHeight:52})}>{saveLbl}</button>}

            {/* Histórico */}
            <div style={{marginTop:26}}>
              <Lbl c="Histórico de Treinos"/>
              {hist.length===0 ? (
                <div style={{textAlign:"center",color:FT,fontSize:13,padding:"18px 0"}}>Nenhum treino salvo ainda.</div>
              ) : hist.slice().sort(function(a,b){return b.ts-a.ts;}).map(function(s){
                var dt=s.date?s.date.split("-").reverse().join("/").slice(0,5):"—";
                var dn=DAYS[s.day]?DAYS[s.day].lb:s.day;
                var entries=(s.entries||[]).filter(function(e){return(e.sets&&e.sets.some(function(x){return x.kg||x.reps;}))||e.rpe;});
                return(
                  <div key={s.ts} style={{background:CARD,border:"1px solid "+LN,borderRadius:9,padding:"10px 13px",marginBottom:7}}>
                    <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:7}}>
                      <span style={{fontFamily:MN,fontSize:13,color:G,fontWeight:700}}>{dt}</span>
                      <span style={{fontSize:8,fontWeight:600,letterSpacing:".8px",textTransform:"uppercase",padding:"2px 6px",borderRadius:3,background:BG2,color:DIM}}>{dn}</span>
                      <button onClick={function(){delHist(s.ts);}} style={B({marginLeft:"auto",background:"transparent",color:FT,fontSize:22,padding:"0 5px",minHeight:40,minWidth:40,display:"flex",alignItems:"center",justifyContent:"center"})}>×</button>
                    </div>
                    {entries.map(function(en,i){
                      return(
                        <div key={i} style={{marginBottom:7}}>
                          <div style={{fontSize:12,fontWeight:600,color:TX,marginBottom:4}}>{en.name}</div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                            {(en.sets||[]).map(function(st,si){
                              var ok=!!(st.kg||st.reps);
                              return(<span key={si} style={{fontFamily:MN,fontSize:11,background:BG2,border:"1px solid "+(ok?GD:LN),borderRadius:5,padding:"3px 8px",color:ok?G:DIM}}>{si+1} {st.kg?st.kg+"kg":"—"}×{st.reps||"—"}</span>);
                            })}
                          </div>
                          {en.rpe && <div style={{fontSize:10,color:FT,marginTop:3}}>RPE {en.rpe}</div>}
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ═══ TESTE 1RM ═══ */}
        {mode==="rm" && (
          <div>
            <div style={{background:"rgba(124,92,191,.1)",border:"1px solid "+PU,borderRadius:9,padding:"11px 13px",marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:600,color:"#d1c4e9",marginBottom:3}}>⚠️ Protocolo de Teste 1RM</div>
              <div style={{fontSize:11,color:DIM,lineHeight:1.5}}>Descanse 2–3 dias antes. Teste <b style={{color:TX}}>1 lift por dia</b> com pelo menos 1 dia de folga entre cada.</div>
            </div>
            <div style={{marginBottom:14}}>
              <Lbl c="Lift a testar"/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                {["squat","bench","dead"].map(function(l){
                  return(
                    <button key={l} onClick={function(){setRmLift(l);setAttempts([{kg:"",ok:null},{kg:"",ok:null},{kg:"",ok:null}]);setRmUpdated(null);}} style={B({background:rmLift===l?PU:CARD,border:"1px solid "+(rmLift===l?PU:LN),borderRadius:9,color:rmLift===l?"#fff":DIM,fontSize:13,fontWeight:600,padding:"12px 4px",minHeight:46,textTransform:"uppercase"})}>
                      {l==="squat"?"🏋️ Squat":l==="bench"?"🤜 Bench":"⬆️ Dead"}
                    </button>
                  );
                })}
              </div>
            </div>
            <div style={{background:CARD,border:"1px solid "+LN,borderRadius:9,padding:"9px 13px",marginBottom:12,display:"flex",alignItems:"center",gap:9}}>
              <label style={{fontSize:11,letterSpacing:1,textTransform:"uppercase",color:DIM}}>📅 Data</label>
              <input type="date" value={rmDate} onChange={function(e){setRmDate(e.target.value);}} style={{flex:1,background:"transparent",color:G,fontFamily:MN,fontWeight:700,fontSize:15}}/>
            </div>
            <div style={{background:BG2,border:"1px solid "+LN,borderRadius:11,marginBottom:14,overflow:"hidden"}}>
              <div onClick={function(){setRmWuOpen(function(p){return !p;});}} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:13,minHeight:48,cursor:"pointer",touchAction:"manipulation",WebkitTapHighlightColor:"transparent"}}>
                <span style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:G,fontWeight:500}}>🔥 Aquecimento para Teste</span>
                <span style={{color:DIM,fontSize:12,transition:"transform .2s",transform:rmWuOpen?"rotate(180deg)":"none",display:"inline-block"}}>▼</span>
              </div>
              {rmWuOpen && (
                <div style={{padding:"0 13px 12px"}}>
                  {rmWuS.map(function(s,i){
                    var rv=getRmV(rmLift);
                    var kg=s.kg!==undefined?s.kg:(rv>0?r25(rv*s.pct/100):null);
                    return(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:9,padding:"7px 9px",background:CARD,borderRadius:7,marginBottom:4,border:"1px solid "+LN}}>
                        <span style={{fontFamily:MN,fontSize:10,color:FT,minWidth:18}}>{i+1}ª</span>
                        <span style={{fontFamily:MN,fontWeight:800,fontSize:18,color:G,minWidth:55}}>{kg!==null?kg+"kg":"—"}</span>
                        <span style={{fontFamily:MN,fontWeight:700,fontSize:12,color:TX}}>× {s.reps}</span>
                        <span style={{fontSize:10,color:FT,marginLeft:"auto"}}>{s.lb||s.pct+"%"}</span>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
            <div style={{background:CARD,border:"1px solid "+LN,borderRadius:11,padding:13,marginBottom:14}}>
              <div style={{fontSize:13,letterSpacing:1.5,textTransform:"uppercase",color:"#d1c4e9",fontWeight:600,marginBottom:12}}>🏆 Tentativas — {LIFT_NAMES[rmLift]}</div>
              {attempts.map(function(a,i){
                var sg=sugg[i];
                var labels=["1ª Abertura","2ª Tentativa","3ª (PR)"];
                var bCols=[BL,G,PU];
                return(
                  <div key={i} style={{display:"grid",gridTemplateColumns:"55px 1fr 80px",gap:8,marginBottom:8,alignItems:"center"}}>
                    <div style={{display:"flex",flexDirection:"column",gap:2}}>
                      <span style={{fontFamily:MN,fontSize:10,fontWeight:700,color:bCols[i]}}>{labels[i]}</span>
                      {sg && <span style={{fontFamily:MN,fontSize:9,color:FT}}>~{sg}kg</span>}
                    </div>
                    <div style={{background:BG2,border:"1px solid "+(a.ok===true?GR:a.ok===false?R:LN),borderRadius:8,height:44,display:"flex",alignItems:"center",padding:"0 10px"}}>
                      <input type="number" inputMode="decimal" placeholder={sg?String(sg):"kg"} value={a.kg} onChange={function(ev){setAtt(i,"kg",ev.target.value);}} style={{width:"100%",background:"transparent",color:a.ok===true?GR:a.ok===false?R:TX,fontFamily:MN,fontWeight:800,fontSize:18,textAlign:"center"}}/>
                    </div>
                    <div style={{display:"flex",gap:5,justifyContent:"center"}}>
                      <button onClick={function(){togOk(i,true);}} style={B({background:a.ok===true?"rgba(90,165,95,.25)":BG2,border:"1px solid "+(a.ok===true?GR:LN),borderRadius:7,color:a.ok===true?GR:DIM,fontSize:16,minHeight:44,minWidth:36,display:"flex",alignItems:"center",justifyContent:"center"})}>✓</button>
                      <button onClick={function(){togOk(i,false);}} style={B({background:a.ok===false?"rgba(214,73,59,.25)":BG2,border:"1px solid "+(a.ok===false?R:LN),borderRadius:7,color:a.ok===false?R:DIM,fontSize:16,minHeight:44,minWidth:36,display:"flex",alignItems:"center",justifyContent:"center"})}>✗</button>
                    </div>
                  </div>
                );
              })}
            </div>
            <button onClick={doRmSave} style={B({width:"100%",background:rmSaveBg,color:"#fff",borderRadius:11,fontSize:15,fontWeight:600,textTransform:"uppercase",letterSpacing:1.5,padding:"15px",minHeight:52})}>{rmSaveLbl}</button>
            <div style={{marginTop:26}}>
              <Lbl c="Histórico de Testes 1RM"/>
              {rmHist.length===0 ? (
                <div style={{textAlign:"center",color:FT,fontSize:13,padding:"18px 0"}}>Nenhum teste salvo ainda.</div>
              ) : rmHist.slice().sort(function(a,b){return b.ts-a.ts;}).map(function(s){
                var dt=s.date?s.date.split("-").reverse().join("/").slice(0,5):"—";
                return(
                  <div key={s.ts} style={{background:CARD,border:"1px solid "+LN,borderRadius:9,padding:"10px 13px",marginBottom:7}}>
                    <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:7}}>
                      <span style={{fontFamily:MN,fontSize:13,color:G,fontWeight:700}}>{dt}</span>
                      <span style={{fontSize:9,fontWeight:600,padding:"2px 7px",borderRadius:3,background:"rgba(124,92,191,.2)",color:"#d1c4e9"}}>{LIFT_NAMES[s.lift]}</span>
                      {s.bestKg && <span style={{fontFamily:MN,fontSize:13,fontWeight:800,color:GR,marginLeft:"auto"}}>✓ {s.bestKg}kg</span>}
                      <button onClick={function(){delRmHist(s.ts);}} style={B({background:"transparent",color:FT,fontSize:22,padding:"0 5px",minHeight:40,minWidth:32,display:"flex",alignItems:"center",justifyContent:"center"})}>×</button>
                    </div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      {(s.attempts||[]).map(function(a,i){
                        if(!a.kg) return null;
                        var ok=a.ok===true,fail=a.ok===false;
                        return(<span key={i} style={{fontFamily:MN,fontSize:12,background:BG2,border:"1px solid "+(ok?GR:fail?R:LN),borderRadius:5,padding:"4px 9px",color:ok?GR:fail?R:DIM}}>{i+1}ª {a.kg}kg {ok?"✓":fail?"✗":""}</span>);
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ═══ METAS ═══ */}
        {mode==="metas" && (
          <div>
            <div style={{background:"rgba(90,165,95,.1)",border:"1px solid "+GR,borderRadius:9,padding:"11px 13px",marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:600,color:"#a5d6a7",marginBottom:3}}>🎯 Meta de Recomposição — Dez 2026</div>
              <div style={{fontSize:11,color:DIM,lineHeight:1.5}}>Ganhar força + perder gordura mantendo 93kg. A barra mostra o progresso rumo à meta de recomp (Dez). Meta cheia = ~12 meses.</div>
            </div>
            {["squat","bench","dead"].map(function(lift){
              var m=METAS[lift];
              var atual=getRmV(lift)||m.atual;
              var prog=Math.max(0,Math.min(100,((atual-m.atual)/(m.recomp-m.atual))*100));
              var cor=lift==="squat"?GR:lift==="bench"?R:G;
              var corBg=lift==="squat"?"rgba(90,165,95,.15)":lift==="bench"?"rgba(214,73,59,.15)":"rgba(232,165,52,.15)";
              var ganho=(atual-m.atual).toFixed(1);
              var falta=(m.recomp-atual).toFixed(1);
              return(
                <div key={lift} style={{background:CARD,border:"1px solid "+LN,borderRadius:11,padding:"14px 13px",marginBottom:11}}>
                  <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:10}}>
                    <span style={{fontSize:16,fontWeight:600,color:cor}}>{LIFT_NAMES[lift]}</span>
                    <span style={{fontFamily:MN,fontSize:13,color:DIM}}><b style={{color:cor,fontSize:18}}>{atual}</b> / {m.recomp}kg</span>
                  </div>
                  <div style={{position:"relative",height:26,background:BG2,borderRadius:13,overflow:"hidden",border:"1px solid "+LN,marginBottom:8}}>
                    <div style={{position:"absolute",left:0,top:0,height:"100%",width:prog+"%",background:"linear-gradient(90deg,"+cor+"99,"+cor+")",borderRadius:13,transition:"width .4s",display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:8}}>
                      {prog>15 && <span style={{fontFamily:MN,fontSize:11,fontWeight:700,color:"#fff"}}>{prog.toFixed(0)}%</span>}
                    </div>
                    {prog<=15 && <span style={{position:"absolute",left:8,top:5,fontFamily:MN,fontSize:11,fontWeight:700,color:DIM}}>{prog.toFixed(0)}%</span>}
                  </div>
                  <div style={{display:"flex",gap:8,marginBottom:10}}>
                    <div style={{flex:1,background:corBg,borderRadius:7,padding:"7px 9px",textAlign:"center"}}>
                      <div style={{fontFamily:MN,fontSize:15,fontWeight:800,color:cor}}>+{ganho}kg</div>
                      <div style={{fontSize:9,color:DIM,textTransform:"uppercase",letterSpacing:.5,marginTop:1}}>Ganho</div>
                    </div>
                    <div style={{flex:1,background:BG2,borderRadius:7,padding:"7px 9px",textAlign:"center"}}>
                      <div style={{fontFamily:MN,fontSize:15,fontWeight:800,color:parseFloat(falta)>0?TX:GR}}>{parseFloat(falta)>0?falta+"kg":"✓"}</div>
                      <div style={{fontSize:9,color:DIM,textTransform:"uppercase",letterSpacing:.5,marginTop:1}}>Falta</div>
                    </div>
                    <div style={{flex:1,background:BG2,borderRadius:7,padding:"7px 9px",textAlign:"center"}}>
                      <div style={{fontFamily:MN,fontSize:15,fontWeight:800,color:"#b39ddb"}}>{m.cheia}kg</div>
                      <div style={{fontSize:9,color:DIM,textTransform:"uppercase",letterSpacing:.5,marginTop:1}}>~12 meses</div>
                    </div>
                  </div>
                  <div style={{borderTop:"1px solid "+LN,paddingTop:9}}>
                    <div style={{fontSize:9,color:FT,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>1RM esperado ao fim de cada bloco</div>
                    <div style={{display:"flex",gap:5}}>
                      {m.blocos.map(function(b,i){
                        var at=atual>=b;
                        return(
                          <div key={i} style={{flex:1,background:at?corBg:BG2,border:"1px solid "+(at?cor:LN),borderRadius:6,padding:"6px 2px",textAlign:"center"}}>
                            <div style={{fontSize:8,color:DIM,textTransform:"uppercase"}}>B{i+1}</div>
                            <div style={{fontFamily:MN,fontSize:12,fontWeight:700,color:at?cor:DIM}}>{b}</div>
                            {at && <div style={{fontSize:9,color:cor}}>✓</div>}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>
              );
            })}
            <div style={{background:"linear-gradient(145deg,"+CARD2+","+CARD+")",border:"1px solid "+GD,borderRadius:11,padding:"14px 13px",marginBottom:11}}>
              <div style={{fontSize:13,letterSpacing:1.5,textTransform:"uppercase",color:G,fontWeight:600,marginBottom:10,textAlign:"center"}}>Total dos 3 Lifts</div>
              {(function(){
                var ta=(getRmV("squat")||102.5)+(getRmV("bench")||85)+(getRmV("dead")||195);
                var tm=117.5+91.5+207.5;
                var ti=102.5+85+195;
                var pg=Math.max(0,Math.min(100,((ta-ti)/(tm-ti))*100));
                return(
                  <div>
                    <div style={{textAlign:"center",marginBottom:10}}>
                      <span style={{fontFamily:MN,fontSize:32,fontWeight:800,color:G}}>{ta.toFixed(1)}</span>
                      <span style={{fontFamily:MN,fontSize:16,color:DIM}}> / {tm}kg</span>
                    </div>
                    <div style={{position:"relative",height:24,background:BG2,borderRadius:12,overflow:"hidden",border:"1px solid "+LN}}>
                      <div style={{position:"absolute",left:0,top:0,height:"100%",width:pg+"%",background:"linear-gradient(90deg,"+GD+","+G+")",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center"}}>
                        <span style={{fontFamily:MN,fontSize:11,fontWeight:700,color:"#1a1208"}}>{pg.toFixed(0)}%</span>
                      </div>
                    </div>
                    <div style={{textAlign:"center",marginTop:8,fontSize:11,color:DIM}}>
                      Ganho total: <b style={{color:G}}>+{(ta-ti).toFixed(1)}kg</b> · Falta <b style={{color:TX}}>{(tm-ta).toFixed(1)}kg</b>
                    </div>
                  </div>
                );
              })()}
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

// Esconde loading, mostra app, monta React
document.getElementById('loading').style.display = 'none';
document.getElementById('root').style.display = 'block';
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
