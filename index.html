<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meu Treino">
<title>Meu Treino — Powerlifting</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700;800&display=swap">
<style>
  :root{
    --gold:#e8a534; --goldD:#a8761f; --red:#d6493b; --blue:#4d83c4;
    --green:#5aa55f; --purple:#7c5cbf;
    --bg:#0c0c0e; --bg2:#141418; --card:#1a1a20; --card2:#22222a; --line:#2e2e38;
    --txt:#f2f0ea; --dim:#8c8a85; --faint:#5a5852;
    --mono:'JetBrains Mono',monospace; --ui:'Oswald',sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0;}
  html,body{background:var(--bg); color:var(--txt); font-family:var(--ui);}
  body{padding:0 13px calc(80px + env(safe-area-inset-bottom)); padding-top:env(safe-area-inset-top); -webkit-text-size-adjust:100%;}
  input{font-family:var(--mono); -webkit-appearance:none; appearance:none;}
  button{font-family:var(--ui); cursor:pointer; border:none; outline:none; background:none;}
  .hidden{display:none !important;}

  /* HEADER */
  .header{padding:20px 0 13px; text-align:center; border-bottom:2px solid var(--line); margin-bottom:16px;}
  .header .sub{font-size:10px; letter-spacing:5px; text-transform:uppercase; color:var(--gold); font-weight:500;}
  .header .ttl{font-size:27px; font-weight:700; text-transform:uppercase; letter-spacing:1px;}
  .header .ttl span{color:var(--gold);}

  /* TIMER */
  #timerBar{position:sticky; top:0; z-index:100; background:rgba(12,12,14,.97); border-bottom:3px solid var(--gold);
    padding:10px 13px; display:flex; align-items:center; gap:12px; backdrop-filter:blur(8px);}
  #timerBar.warn{border-bottom-color:var(--red);}
  #timerBar .tval{font-family:var(--mono); font-weight:800; font-size:30px; color:var(--gold); min-width:72px; line-height:1;}
  #timerBar.warn .tval{color:var(--red);}
  #timerBar .tbar{flex:1;}
  #timerBar .track{height:6px; background:var(--line); border-radius:3px; overflow:hidden;}
  #timerBar .fill{height:100%; background:var(--gold); border-radius:3px; transition:width 1s linear;}
  #timerBar.warn .fill{background:var(--red);}
  #timerBar .tlab{font-size:10px; color:var(--dim); margin-top:4px; letter-spacing:.5px;}
  #timerBar .tx{background:transparent; color:var(--faint); font-size:24px; min-width:44px; min-height:44px;
    display:flex; align-items:center; justify-content:center;}

  /* TABS */
  .tabs{display:flex; gap:4px; background:var(--bg2); border:1px solid var(--line); border-radius:11px; padding:4px; margin-bottom:16px;}
  .tabs button{flex:1; background:transparent; color:var(--dim); font-size:13px; font-weight:600; text-transform:uppercase;
    letter-spacing:.5px; padding:13px 4px; border-radius:8px; min-height:46px;}
  .tabs button.on{color:#fff;}
  .tabs button.on.treino{background:var(--gold);}
  .tabs button.on.rm{background:var(--purple);}

  /* LABEL */
  .lbl{font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--dim); font-weight:500;
    margin-bottom:8px; display:flex; align-items:center; gap:7px;}
  .lbl::before{content:""; width:14px; height:2px; background:var(--gold); flex-shrink:0; display:block;}

  /* 1RM */
  .rm-grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:7px;}
  .rm-cell{background:var(--card); border:1px solid var(--line); border-radius:10px; padding:9px 6px; text-align:center;}
  .rm-cell label{display:block; font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--dim); margin-bottom:5px;}
  .rm-cell input{width:100%; background:transparent; border:none; outline:none; color:var(--gold);
    font-weight:800; font-size:21px; text-align:center;}

  .updated{margin-top:8px; background:rgba(124,92,191,.15); border:1px solid var(--purple); border-radius:8px;
    padding:8px 12px; font-size:12px; color:#b39ddb; text-align:center;}

  /* DAY TABS */
  .day-tabs{display:flex; gap:4px; background:var(--bg2); border:1px solid var(--line); border-radius:11px; padding:4px;}
  .day-tabs button{flex:1; background:transparent; color:var(--dim); font-size:13px; font-weight:600; text-transform:uppercase;
    letter-spacing:.8px; padding:13px 2px; border-radius:8px; min-height:46px;}
  .day-tabs button.on{background:var(--gold); color:#1a1208;}

  /* PHASE */
  .ph-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:5px;}
  .ph-grid button{background:var(--card); border:1px solid var(--line); border-radius:9px; color:var(--dim);
    font-size:11px; font-weight:500; text-transform:uppercase; padding:11px 3px; min-height:50px;
    display:flex; flex-direction:column; gap:2px; align-items:center;}
  .ph-grid button.on{background:var(--card2); border-color:var(--gold); color:var(--txt);}
  .ph-grid button .wk{font-size:9px; color:var(--faint);}
  .ph-grid button.on .wk{color:var(--gold);}

  /* DATE */
  .date-row{background:var(--card); border:1px solid var(--line); border-radius:9px; padding:9px 13px;
    display:flex; align-items:center; gap:9px;}
  .date-row label{font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--dim);}
  .date-row input{flex:1; background:transparent; border:none; outline:none; color:var(--gold); font-weight:700; font-size:15px;}

  /* BANNER */
  .banner{border-radius:9px; padding:11px 13px; border:1px solid var(--line); border-left:4px solid var(--gold); background:var(--card2);}
  .banner.heavy{border-left-color:var(--red);} .banner.volume{border-left-color:var(--blue);} .banner.rec{border-left-color:var(--green);}
  .banner .t{font-size:16px; font-weight:600; text-transform:uppercase; letter-spacing:.8px;}
  .banner .s{font-size:12px; color:var(--dim); font-weight:300; margin-top:2px;}

  /* COLLAPSE */
  .collapse{background:var(--bg2); border:1px solid var(--line); border-radius:11px; overflow:hidden;}
  .collapse .head{display:flex; align-items:center; justify-content:space-between; padding:13px; min-height:48px; cursor:pointer;}
  .collapse .head .ct{font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--gold); font-weight:500;}
  .collapse .head .arr{color:var(--dim); font-size:12px; transition:transform .2s;}
  .collapse.open .head .arr{transform:rotate(180deg);}
  .collapse .body{padding:0 13px 12px;}
  .wu-step{display:flex; align-items:center; gap:9px; padding:7px 9px; background:var(--card); border-radius:7px;
    margin-bottom:4px; border:1px solid var(--line);}
  .wu-step .n{font-family:var(--mono); font-size:10px; color:var(--faint); min-width:18px;}
  .wu-step .kg{font-family:var(--mono); font-weight:800; font-size:18px; color:var(--gold); min-width:55px;}
  .wu-step .rp{font-family:var(--mono); font-weight:700; font-size:12px; color:var(--txt);}
  .wu-step .pc{font-size:10px; color:var(--faint); margin-left:auto;}
  .wu-grp{font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.8px; margin:9px 0 5px; font-weight:500;}

  /* EXERCISE CARD */
  .ex{background:var(--card); border:1px solid var(--line); border-radius:11px; padding:12px 13px; margin-bottom:9px;}
  .ex.main{background:linear-gradient(145deg,var(--card2),var(--card)); border-color:var(--goldD);}
  .ex .top{display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:3px;}
  .ex .nm{font-size:15px; font-weight:600; line-height:1.2;}
  .ex .rest{font-size:10px; color:var(--faint); font-family:var(--mono); white-space:nowrap; margin-top:2px;}
  .badge{font-size:9px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; padding:2px 6px; border-radius:4px; display:inline-block;}
  .badge.main{background:rgba(232,165,52,.15); color:var(--gold);}
  .badge.acc{background:rgba(140,138,133,.15); color:var(--dim);}
  .presc{display:flex; gap:12px; margin-top:8px; flex-wrap:wrap; align-items:baseline;}
  .presc .big{font-family:var(--mono); font-weight:800; font-size:26px; color:var(--gold); line-height:1;}
  .presc .unit{font-size:12px; color:var(--dim);}
  .presc .sr{font-family:var(--mono); font-weight:700; font-size:17px; color:var(--txt);}
  .presc .rpe{font-size:12px; color:var(--dim);}
  .presc-note{font-family:var(--mono); font-size:10px; color:var(--faint); margin-top:2px;}
  .vol-note{font-size:11px; color:var(--gold); margin-top:3px;}

  .swap-btn{margin-top:9px; font-size:11px; color:var(--blue); border:1px dashed var(--line); padding:8px 10px;
    border-radius:7px; display:inline-flex; align-items:center; gap:4px; background:transparent; min-height:40px;}
  .swap-opts{margin-top:7px; display:flex; flex-wrap:wrap; gap:5px;}
  .swap-opts button{background:var(--bg2); border:1px solid var(--line); color:var(--dim); font-size:11px;
    padding:8px 10px; border-radius:7px; min-height:38px;}
  .swap-opts button.on{background:rgba(77,131,196,.12); border-color:var(--blue); color:var(--blue);}

  /* SET LOG */
  .log{margin-top:11px; padding-top:11px; border-top:1px solid var(--line);}
  .log-head{display:grid; grid-template-columns:26px 1fr 1fr 44px; gap:5px; margin-bottom:5px;}
  .log-head span{font-size:9px; letter-spacing:.5px; text-transform:uppercase; color:var(--faint); text-align:center;}
  .log-row{display:grid; grid-template-columns:26px 1fr 1fr 44px; gap:5px; margin-bottom:5px; align-items:center;}
  .log-row .num{font-family:var(--mono); font-size:12px; font-weight:700; color:var(--dim); text-align:center;
    background:var(--bg2); border:1px solid var(--line); border-radius:6px; height:42px; display:flex; align-items:center; justify-content:center;}
  .log-row .cell{background:var(--bg2); border:1px solid var(--line); border-radius:7px; height:42px; display:flex; align-items:center; padding:0 6px;}
  .log-row .cell input{width:100%; background:transparent; border:none; outline:none; font-weight:700; font-size:15px; text-align:center;}
  .log-row .cell input.kg{color:var(--gold);} .log-row .cell input.reps{color:var(--txt);}
  .log-row .tbtn{background:var(--bg2); border:1px solid var(--line); border-radius:7px; height:42px; color:var(--faint);
    font-size:18px; display:flex; align-items:center; justify-content:center;}
  .log-row .tbtn.on{background:rgba(232,165,52,.25); border-color:var(--gold); color:var(--gold);}
  .rpe-row{display:flex; align-items:center; gap:10px; margin-top:6px; padding-top:6px; border-top:1px dashed var(--line);}
  .rpe-row .lab{font-size:9px; letter-spacing:1px; text-transform:uppercase; color:var(--faint); white-space:nowrap;}
  .rpe-row .cell{flex:1; background:var(--bg2); border:1px solid var(--line); border-radius:7px; height:38px; display:flex; align-items:center; padding:0 8px;}
  .rpe-row .cell input{width:100%; background:transparent; border:none; outline:none; color:var(--gold); font-weight:700; font-size:14px; text-align:center;}

  /* RECOVERY */
  .rec-item{background:var(--card); border:1px solid var(--line); border-radius:9px; padding:12px 13px; margin-bottom:7px;}
  .rec-item .t{font-size:14px; font-weight:500;}
  .rec-item .s{font-size:11px; color:var(--dim); font-weight:300; margin-top:2px;}

  /* BUTTONS */
  .save-btn{flex:1; background:var(--gold); color:#1a1208; border-radius:11px; font-size:15px; font-weight:600;
    text-transform:uppercase; letter-spacing:1.5px; padding:15px; min-height:52px;}
  .save-btn.done{background:var(--green); color:#fff;} .save-btn.err{background:var(--red); color:#fff;}
  .exp-btn{background:var(--card); border:1px solid var(--line); color:var(--dim); border-radius:11px; font-size:13px;
    font-weight:600; padding:15px 14px; min-height:52px; display:flex; flex-direction:column; align-items:center; gap:2px;}
  .exp-btn.on{background:var(--card2); border-color:var(--blue); color:var(--blue);}
  .exp-btn .ico{font-size:20px;}
  .exp-btn .t{font-size:9px; letter-spacing:.5px;}

  /* EXPORT PANEL */
  .exp-panel{background:var(--card); border:1px solid var(--blue); border-radius:11px; padding:14px; margin-bottom:10px;}
  .exp-panel .h{font-size:11px; color:var(--blue); letter-spacing:1px; text-transform:uppercase; font-weight:600; margin-bottom:12px;}
  .exp-panel .desc{font-size:11px; color:var(--dim); margin-bottom:12px; line-height:1.5;}
  .exp-opt{background:var(--bg2); border:1px solid var(--line); border-radius:9px; padding:13px 14px;
    display:flex; align-items:center; gap:12px; min-height:52px; width:100%; margin-bottom:8px;}
  .exp-opt .ico{font-size:22px;}
  .exp-opt .txt{text-align:left;}
  .exp-opt .txt .t{font-size:13px; font-weight:600; color:var(--txt);}
  .exp-opt .txt .s{font-size:10px; color:var(--dim);}
  .exp-tip{margin-top:4px; padding:8px 10px; background:rgba(77,131,196,.08); border:1px dashed var(--blue);
    border-radius:7px; font-size:10px; color:var(--dim); line-height:1.5;}

  /* HISTORY */
  .hist-item{background:var(--card); border:1px solid var(--line); border-radius:9px; padding:10px 13px; margin-bottom:7px;}
  .hist-item .head{display:flex; align-items:center; gap:9px; margin-bottom:7px;}
  .hist-item .dt{font-family:var(--mono); font-size:13px; color:var(--gold); font-weight:700;}
  .hist-item .tag{font-size:8px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; padding:2px 6px;
    border-radius:3px; background:var(--bg2); color:var(--dim);}
  .hist-item .tag.rm{background:rgba(124,92,191,.2); color:#d1c4e9; font-size:9px; padding:2px 7px;}
  .hist-item .best{font-family:var(--mono); font-size:13px; font-weight:800; color:var(--green); margin-left:auto;}
  .hist-item .del{margin-left:auto; background:transparent; color:var(--faint); font-size:22px; padding:0 5px;
    min-height:40px; min-width:40px; display:flex; align-items:center; justify-content:center;}
  .hist-item .del.rm{margin-left:0;}
  .hist-ex{margin-bottom:7px;}
  .hist-ex .nm{font-size:12px; font-weight:600; color:var(--txt); margin-bottom:4px;}
  .hist-sets{display:flex; flex-wrap:wrap; gap:5px;}
  .hist-sets .chip{font-family:var(--mono); font-size:11px; background:var(--bg2); border:1px solid var(--line);
    border-radius:5px; padding:3px 8px; color:var(--dim);}
  .hist-sets .chip.on{border-color:var(--goldD); color:var(--gold);}
  .hist-ex .rpe{font-size:10px; color:var(--faint); margin-top:3px;}
  .empty{text-align:center; color:var(--faint); font-size:13px; padding:18px 0;}

  /* RM MODE */
  .warn-box{background:rgba(124,92,191,.1); border:1px solid var(--purple); border-radius:9px; padding:11px 13px;}
  .warn-box .t{font-size:13px; font-weight:600; color:#d1c4e9; margin-bottom:3px;}
  .warn-box .s{font-size:11px; color:var(--dim); line-height:1.5;}
  .lift-grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px;}
  .lift-grid button{background:var(--card); border:1px solid var(--line); border-radius:9px; color:var(--dim);
    font-size:13px; font-weight:600; padding:12px 4px; min-height:46px; text-transform:uppercase;}
  .lift-grid button.on{background:var(--purple); border-color:var(--purple); color:#fff;}
  .att-box{background:var(--card); border:1px solid var(--line); border-radius:11px; padding:13px;}
  .att-box .h{font-size:13px; letter-spacing:1.5px; text-transform:uppercase; color:#d1c4e9; font-weight:600; margin-bottom:12px;}
  .att-head{display:grid; grid-template-columns:50px 1fr 80px; gap:8px; margin-bottom:6px;}
  .att-head span{font-size:9px; letter-spacing:.5px; text-transform:uppercase; color:var(--faint);}
  .att-head span:last-child{text-align:center;}
  .att-row{display:grid; grid-template-columns:50px 1fr 80px; gap:8px; margin-bottom:8px; align-items:center;}
  .att-row .lab{display:flex; flex-direction:column; gap:2px;}
  .att-row .lab .l{font-family:var(--mono); font-size:10px; font-weight:700;}
  .att-row .lab .sug{font-family:var(--mono); font-size:9px; color:var(--faint);}
  .att-row .cell{background:var(--bg2); border:1px solid var(--line); border-radius:8px; height:46px;
    display:flex; align-items:center; padding:0 10px; transition:border-color .15s;}
  .att-row .cell.ok{border-color:var(--green);} .att-row .cell.fail{border-color:var(--red);}
  .att-row .cell input{width:100%; background:transparent; border:none; outline:none; color:var(--txt);
    font-weight:800; font-size:18px; text-align:center;}
  .att-row .cell.ok input{color:var(--green);} .att-row .cell.fail input{color:var(--red);}
  .att-row .res{display:flex; gap:5px; justify-content:center;}
  .att-row .res button{background:var(--bg2); border:1px solid var(--line); border-radius:7px; color:var(--dim);
    font-size:18px; min-height:46px; min-width:36px; display:flex; align-items:center; justify-content:center;}
  .att-row .res button.ok{background:rgba(90,165,95,.25); border-color:var(--green); color:var(--green);}
  .att-row .res button.fail{background:rgba(214,73,59,.25); border-color:var(--red); color:var(--red);}
  .att-tip{margin-top:8px; padding:8px 10px; background:rgba(124,92,191,.08); border:1px dashed var(--purple);
    border-radius:7px; font-size:11px; color:var(--dim); line-height:1.4;}
  .rm-save-btn{width:100%; background:var(--purple); color:#fff; border-radius:11px; font-size:15px; font-weight:600;
    text-transform:uppercase; letter-spacing:1.5px; padding:15px; min-height:52px;}
  .rm-save-btn.done{background:var(--green);} .rm-save-btn.err{background:var(--red);}
  .rm-save-note{font-size:10px; color:var(--faint); text-align:center; margin-top:5px;}

  .mt16{margin-top:16px;} .mt26{margin-top:26px;} .mb8{margin-bottom:8px;}
  .mb9{margin-bottom:9px;} .mb10{margin-bottom:10px;} .mb12{margin-bottom:12px;}
  .mb14{margin-bottom:14px;} .mb15{margin-bottom:15px;} .mb16{margin-bottom:16px;}
  b{color:var(--txt);}
</style>
</head>
<body>
<div id="app"></div>

<script>

};

  sab:[{lift:"bench",title:"Supino",steps:[{lb:"Barra",kg:20,reps:"10"},{pct:40,reps:"8"},{pct:60,reps:"5"},{pct:75,reps:"2"},{pct:85,reps:"1"}]},{lift:"dead",title:"Terra",steps:[{lb:"Barra",kg:20,reps:"5"},{pct:40,reps:"5"},{pct:60,reps:"3"},{pct:75,reps:"2"},{pct:85,reps:"1"}]}]
};
const DAYS={

/* ═══════════════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════════════ */
function r25(x){return Math.round(x/2.5)*2.5;}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function getRmVal(lift){const v=parseFloat(S.rm[RM_K[lift]]);return isNaN(v)?0:v;}
function comp(lift,dt){
  const rmv=getRmVal(lift);
  const cfg=dt==="heavy"?PROG[lift]?.heavy?.[S.phase]:PROG[lift]?.volume;
  if(!cfg)return null;
  return{...cfg,kg:rmv>0?r25(rmv*cfg.pct/100):null,exact:rmv>0?(rmv*cfg.pct/100).toFixed(1):null,fixed:dt==="volume"};
}
function numSets(e){if(e.main){const m=comp(e.main.lift,e.main.dt);return m?m.sets:3;}return e.sets||3;}
function tReps(e){if(e.main){const m=comp(e.main.lift,e.main.dt);return m?m.reps:"-";}return e.reps||"-";}
function fmtTime(s){return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");}

/* ═══════════════════════════════════════════════════════════
   TIMER
   ═══════════════════════════════════════════════════════════ */
let timerData=null, timerInt=null;
function startTimer(exId,si,secs){
  if(timerInt)clearInterval(timerInt);
  timerData={exId,si,secs,total:secs};
  renderTimer(); markTimerBtns();
  timerInt=setInterval(()=>{
    if(!timerData||timerData.secs<=1){stopTimer();return;}
    timerData.secs--; renderTimer();
  },1000);
}
function stopTimer(){
  if(timerInt)clearInterval(timerInt);
  timerData=null; timerInt=null;
  renderTimer(); markTimerBtns();
}
function renderTimer(){
  const bar=document.getElementById("timerBar");
  if(!bar)return;
  if(!timerData){bar.classList.add("hidden");return;}
  bar.classList.remove("hidden");
  bar.classList.toggle("warn",timerData.secs<=10);
  bar.querySelector(".tval").textContent=fmtTime(timerData.secs);
  bar.querySelector(".fill").style.width=(timerData.secs/timerData.total*100)+"%";
}
function markTimerBtns(){
  document.querySelectorAll(".tbtn").forEach(b=>{
    const on=timerData&&b.dataset.ex===timerData.exId&&+b.dataset.si===timerData.si;
    b.classList.toggle("on",on);
    b.textContent=on?"⏹":"⏱";
  });
}

/* ═══════════════════════════════════════════════════════════
   EXPORT — usa Web Share API (iOS) com fallback
   ═══════════════════════════════════════════════════════════ */
function buildTxt(){
  const today=new Date().toLocaleDateString("pt-BR");
  let out="POWERLIFTING — MEU TREINO\nExportado em: "+today+"\n"+"=".repeat(40)+"\n\n";
  out+="1RM ATUAL\n"+"-".repeat(20)+"\n";
  out+="Agachamento : "+(S.rm.sq||"—")+" kg\n";
  out+="Supino      : "+(S.rm.bn||"—")+" kg\n";
  out+="Terra       : "+(S.rm.dl||"—")+" kg\n\n";
  if(S.hist.length){
    out+="=".repeat(40)+"\nHISTÓRICO DE TREINOS\n"+"=".repeat(40)+"\n\n";
    [...S.hist].sort((a,b)=>b.ts-a.ts).forEach(s=>{
      const dt=s.date?s.date.split("-").reverse().join("/"):"—";
      const dn=DAYS[s.day]?.lb||s.day;
      out+=dt+" — "+dn+" ("+(PH_LBL[s.phase]||s.phase)+")\n"+"-".repeat(30)+"\n";
      (s.entries||[]).forEach(e=>{
        if(!(e.sets?.some(x=>x.kg||x.reps)||e.rpe))return;
        out+="  "+e.name+"\n";
        (e.sets||[]).forEach((st,i)=>{if(st.kg||st.reps)out+="    Série "+(i+1)+": "+(st.kg||"—")+"kg × "+(st.reps||"—")+"\n";});
        if(e.rpe)out+="    RPE: "+e.rpe+"\n";
      });
      out+="\n";
    });
  }
  if(S.rmHist.length){
    out+="=".repeat(40)+"\nHISTÓRICO DE TESTES 1RM\n"+"=".repeat(40)+"\n\n";
    [...S.rmHist].sort((a,b)=>b.ts-a.ts).forEach(s=>{
      const dt=s.date?s.date.split("-").reverse().join("/"):"—";
      out+=dt+" — "+(LIFT_NAMES[s.lift]||s.lift)+"\n";
      if(s.bestKg)out+="  Melhor: "+s.bestKg+"kg ✓\n";
      (s.attempts||[]).forEach((a,i)=>{if(!a.kg)return;const r=a.ok===true?"✓":a.ok===false?"✗":"?";out+="  "+(i+1)+"ª: "+a.kg+"kg "+r+"\n";});
      out+="\n";
    });
  }
  return out;
}
function buildCsv(){
  const rows=[["Data","Dia","Fase","Exercício","Série","Carga (kg)","Reps","RPE"]];
  [...S.hist].sort((a,b)=>b.ts-a.ts).forEach(s=>{
    const dt=s.date?s.date.split("-").reverse().join("/"):"";
    const dn=DAYS[s.day]?.lb||s.day, fase=PH_LBL[s.phase]||s.phase;
    (s.entries||[]).forEach(e=>{
      if(!(e.sets?.some(x=>x.kg||x.reps)||e.rpe))return;
      (e.sets||[]).forEach((st,i)=>{if(st.kg||st.reps)rows.push([dt,dn,fase,e.name,i+1,st.kg||"",st.reps||"",i===0?e.rpe||"":""]);});
    });
  });
  return rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(";")).join("\r\n");
}

async function exportFile(kind){
  const isCsv=kind==="csv";
  const content=isCsv?"\uFEFF"+buildCsv():buildTxt();
  const filename="treino_"+S.date+(isCsv?".csv":".txt");
  const mime=isCsv?"text/csv":"text/plain";
  const file=new File([content],filename,{type:mime+";charset=utf-8"});

  // 1) Web Share API com arquivo (iOS 15+) — abre a folha "Salvar em Arquivos"
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    try{
      await navigator.share({files:[file],title:"Meu Treino"});
      return;
    }catch(err){
      if(err.name==="AbortError")return; // usuário cancelou
    }
  }
  // 2) Fallback: abrir em nova aba como data URI (funciona no Safari)
  try{
    const reader=new FileReader();
    reader.onload=function(){
      const w=window.open();
      if(w){
        w.document.title=filename;
        w.document.body.style.cssText="font-family:monospace;white-space:pre-wrap;padding:16px;font-size:13px;";
        w.document.body.textContent=content;
      }else{
        // 3) Último recurso: download clássico
        const a=document.createElement("a");
        a.href=reader.result; a.download=filename;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
      }
    };
    reader.readAsDataURL(file);
  }catch(e){
    alert("Não foi possível exportar. Tente copiar manualmente o histórico.");
  }
}

/* ═══════════════════════════════════════════════════════════
   AÇÕES
   ═══════════════════════════════════════════════════════════ */
function flashSave(cls,lbl,id){
  const b=document.getElementById(id);
  if(!b)return;
  b.classList.add(cls); b.textContent=lbl;
  setTimeout(()=>render(),1600);
}
function doSave(){
  const d=DAYS[S.day];
  if(d.recovery){flashSave("err","Dia de recuperação","saveBtn");return;}
  if(!S.date){flashSave("err","Preencha a data!","saveBtn");return;}
  const entries=(d.ex||[]).map(e=>{
    const ns=numSets(e),ld=S.log[e.id]||{sets:[],rpe:""};
    return{name:S.subs[e.id]||e.name,sets:Array.from({length:ns},(_,i)=>ld.sets?.[i]||{kg:"",reps:""}),rpe:ld.rpe||""};
  });
  S.hist.push({ts:Date.now(),date:S.date,day:S.day,phase:S.phase,entries});
  S.log={}; persist();
  flashSave("done","✓ Salvo!","saveBtn");
}
function doRmSave(){
  if(!S.rmDate){flashSave("err","Preencha a data!","rmSaveBtn");return;}
  let bestOk=0;
  S.attempts.forEach(a=>{if(a.ok===true){const v=parseFloat(a.kg);if(!isNaN(v)&&v>bestOk)bestOk=v;}});
  S.rmHist.push({ts:Date.now(),date:S.rmDate,lift:S.rmLift,attempts:S.attempts.map(a=>({...a})),bestKg:bestOk||null});
  if(bestOk>0){S.rm[RM_K[S.rmLift]]=String(bestOk);S.rmUpdated=bestOk;}
  persist();
  flashSave("done","✓ Resultado Salvo!","rmSaveBtn");
}
function delHist(ts){S.hist=S.hist.filter(s=>s.ts!==ts);persist();render();}
function delRmHist(ts){S.rmHist=S.rmHist.filter(s=>s.ts!==ts);persist();render();}

/* ═══════════════════════════════════════════════════════════
   INPUT HANDLERS (sem re-render — preserva foco do teclado!)
   ═══════════════════════════════════════════════════════════ */
function onSetInput(exId,si,field,val){
  if(!S.log[exId])S.log[exId]={sets:[],rpe:""};
  while(S.log[exId].sets.length<=si)S.log[exId].sets.push({kg:"",reps:""});
  S.log[exId].sets[si][field]=val;
}
function onRpeInput(exId,val){
  if(!S.log[exId])S.log[exId]={sets:[],rpe:""};
  S.log[exId].rpe=val;
}
function onRmInput(key,val){S.rm[key]=val;persist();updateMainLoads();}
function onAttInput(i,val){S.attempts[i].kg=val;}

/* Atualiza cargas principais sem re-render (1RM mudou) */
function updateMainLoads(){
  document.querySelectorAll("[data-mainload]").forEach(el=>{
    const[lift,dt]=el.dataset.mainload.split("|");
    const m=comp(lift,dt);
    const kgEl=el.querySelector(".big"), noteEl=el.querySelector(".presc-note");
    if(m&&m.kg!==null){
      if(kgEl)kgEl.textContent=m.kg;
      if(noteEl)noteEl.textContent=m.pct+"% do 1RM · exato "+m.exact+"kg";
    }else{
      if(kgEl)kgEl.textContent="—";
      if(noteEl)noteEl.textContent="Preencha o 1RM acima";
    }
  });
}

/* ═══════════════════════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════════════════════ */
function render(){
  S.expOpen=S.expOpen||false;
  const app=document.getElementById("app");
  let h="";

  /* timer bar (fica sempre no DOM, escondida) */
  h+=`<div id="timerBar" class="hidden">
    <div class="tval">0:00</div>
    <div class="tbar"><div class="track"><div class="fill"></div></div>
      <div class="tlab">⏱ INTERVALO — toque × para cancelar</div></div>
    <button class="tx" onclick="stopTimer()">×</button>
  </div>`;

  /* header */
  h+=`<div class="header"><div class="sub">Powerlifting · Programa Moderno</div>
    <div class="ttl">Meu <span>Treino</span></div></div>`;

  /* mode tabs */
  h+=`<div class="tabs">
    <button class="treino ${S.mode==="treino"?"on":""}" onclick="setMode('treino')">📋 Treino</button>
    <button class="rm ${S.mode==="rm"?"on":""}" onclick="setMode('rm')">🏆 Teste 1RM</button>
  </div>`;

  /* 1RM inputs */
  h+=`<div class="mb16"><div class="lbl">Seu 1RM atual (kg)</div><div class="rm-grid">`;
  [["sq","Squat"],["bn","Bench"],["dl","Deadlift"]].forEach(([k,l])=>{
    h+=`<div class="rm-cell"><label>${l}</label>
      <input type="text" inputmode="decimal" placeholder="0" value="${esc(S.rm[k])}"
        oninput="onRmInput('${k}',this.value)"></div>`;
  });
  h+=`</div>`;
  if(S.rmUpdated){
    h+=`<div class="updated">✅ 1RM de ${LIFT_NAMES[S.rmLift]} atualizado para <b style="color:#d1c4e9">${S.rmUpdated}kg</b>! Cargas recalculadas.</div>`;
  }
  h+=`</div>`;

  if(S.mode==="treino")h+=renderTreino();
  else h+=renderRM();

  app.innerHTML=h;
  renderTimer(); markTimerBtns();
}

function renderTreino(){
  const d=DAYS[S.day];
  const hasH=!d.recovery&&d.ex.some(e=>e.main?.dt==="heavy");
  const wubs=WU[S.day]||[];
  let h="";

  /* day tabs */
  h+=`<div class="mb15"><div class="lbl">Dia da Semana</div><div class="day-tabs">`;
  DAY_K.forEach(k=>{h+=`<button class="${S.day===k?"on":""}" onclick="setDay('${k}')">${DAYS[k].lb}</button>`;});
  h+=`</div></div>`;

  /* phase */
  if(hasH){
    h+=`<div class="mb15"><div class="lbl">Fase do Bloco</div><div class="ph-grid">`;
    PH_K.forEach(k=>{h+=`<button class="${S.phase===k?"on":""}" onclick="setPhase('${k}')">
      <span>${PH_LBL[k]}</span><span class="wk">${PH_WK[k]}</span></button>`;});
    h+=`</div></div>`;
  }

  /* date */
  h+=`<div class="date-row mb9"><label>📅 Data</label>
    <input type="date" value="${S.date}" onchange="S.date=this.value"></div>`;

  /* banner */
  h+=`<div class="banner ${d.cls} mb10"><div class="t">${d.lb} — ${d.title}</div><div class="s">${d.sub}</div></div>`;

  /* warmup */
  if(wubs.length){
    h+=`<div class="collapse mb10 ${S.wuOpen?"open":""}">
      <div class="head" onclick="S.wuOpen=!S.wuOpen;render()">
        <span class="ct">🔥 Aquecimento</span><span class="arr">▼</span></div>`;
    if(S.wuOpen){
      h+=`<div class="body">`;
      wubs.forEach(blk=>{
        const rv=getRmVal(blk.lift);
        h+=`<div class="wu-grp">${blk.title}${blk.note?` <span style="color:var(--faint);font-size:9px;text-transform:none;letter-spacing:0">(${blk.note})</span>`:""}</div>`;
        blk.steps.forEach((s,si)=>{
          const kg=s.kg!==undefined?s.kg:(rv>0?r25(rv*s.pct/100):null);
          h+=`<div class="wu-step"><span class="n">${si+1}ª</span>
            <span class="kg">${kg!==null?kg+"kg":"—"}</span>
            <span class="rp">× ${s.reps}</span>
            <span class="pc">${s.lb||s.pct+"%"}</span></div>`;
        });
      });
      h+=`<div style="font-size:10px;color:var(--faint);margin-top:5px;line-height:1.4">Arredonde 1–2kg conforme as anilhas.</div></div>`;
    }
    h+=`</div>`;
  }

  /* exercises */
  if(d.recovery){
    d.ex.forEach(e=>{h+=`<div class="rec-item"><div class="t">${e.rt}</div><div class="s">${e.rs}</div></div>`;});
  }else{
    d.ex.forEach(e=>{
      const nm=S.subs[e.id]||e.name, isM=!!e.main, md=isM?comp(e.main.lift,e.main.dt):null;
      const so=!!S.openS[e.id], cs=S.subs[e.id]||e.name, ns=numSets(e), tr=tReps(e);
      const restSecs=e.rest||(isM?180:90);
      const ld=S.log[e.id]||{sets:[],rpe:""};

      h+=`<div class="ex ${isM?"main":""}">
        <div class="top"><div class="nm">${esc(nm)}</div><div class="rest">⏱ ${fmtTime(restSecs)}</div></div>
        <span class="badge ${isM?"main":"acc"}">${isM?"Principal":"Acessório"}</span>`;

      if(isM&&md){
        h+=`<div class="presc" data-mainload="${e.main.lift}|${e.main.dt}">
          <span><span class="big">${md.kg!==null?md.kg:"—"}</span><span class="unit"> kg</span></span>
          <span class="sr">${md.sets}×${md.reps}</span>
          <span class="rpe">RPE ${md.rpe}</span></div>
          <div class="presc-note">${md.kg!==null?md.pct+"% do 1RM · exato "+md.exact+"kg":"Preencha o 1RM acima"}</div>`;
        if(md.fixed)h+=`<div class="vol-note">Volume — carga fixa, dupla progressão</div>`;
      }else if(!isM){
        h+=`<div class="presc"><span class="sr">${e.sets}×${e.reps}</span><span class="rpe">RPE ${e.rpe}</span></div>`;
      }

      /* swap */
      if(e.subs?.length){
        h+=`<button class="swap-btn" onclick="S.openS['${e.id}']=!S.openS['${e.id}'];render()">🔄 Trocar (sem máquina?)</button>`;
        if(so){
          h+=`<div class="swap-opts">`;
          [e.name,...e.subs].forEach(sn=>{
            h+=`<button class="${cs===sn?"on":""}" onclick="setSub('${e.id}',${JSON.stringify(sn).replace(/"/g,"&quot;")})">${esc(sn)}</button>`;
          });
          h+=`</div>`;
        }
      }

      /* log */
      h+=`<div class="log"><div class="log-head"><span>Nº</span><span>Carga</span><span>Reps</span><span>Rest</span></div>`;
      for(let si=0;si<ns;si++){
        const st=ld.sets?.[si]||{kg:"",reps:""};
        h+=`<div class="log-row">
          <div class="num">${si+1}</div>
          <div class="cell"><input class="kg" type="text" inputmode="decimal" placeholder="kg" value="${esc(st.kg)}"
            oninput="onSetInput('${e.id}',${si},'kg',this.value)"></div>
          <div class="cell"><input class="reps" type="text" inputmode="text" placeholder="${esc(tr)}" value="${esc(st.reps)}"
            oninput="onSetInput('${e.id}',${si},'reps',this.value)"></div>
          <button class="tbtn" data-ex="${e.id}" data-si="${si}" onclick="toggleTimer('${e.id}',${si},${restSecs})">⏱</button>
        </div>`;
      }
      h+=`<div class="rpe-row"><span class="lab">RPE geral</span>
        <div class="cell"><input type="text" inputmode="decimal" placeholder="—" value="${esc(ld.rpe||"")}"
          oninput="onRpeInput('${e.id}',this.value)"></div></div>`;
      h+=`</div></div>`;
    });
  }

  /* save + export */
  if(!d.recovery){
    h+=`<div class="mt16">
      <div style="display:flex;gap:8px" class="mb8">
        <button id="saveBtn" class="save-btn" onclick="doSave()">Salvar Treino</button>
        <button class="exp-btn ${S.expOpen?"on":""}" onclick="S.expOpen=!S.expOpen;render()">
          <span class="ico">📤</span><span class="t">Export</span></button>
      </div>`;
    if(S.expOpen){
      h+=`<div class="exp-panel">
        <div class="h">📤 Exportar dados</div>
        <div class="desc">Toque numa opção → abre a tela de compartilhar do iPhone → escolha <b>"Salvar em Arquivos"</b> para guardar no app Arquivos, ou envie por WhatsApp / e-mail.</div>
        <button class="exp-opt" onclick="exportFile('txt')">
          <span class="ico">📄</span><div class="txt"><div class="t">Texto (.txt)</div>
          <div class="s">Legível, abre em qualquer app de notas</div></div></button>
        <button class="exp-opt" onclick="exportFile('csv')">
          <span class="ico">📊</span><div class="txt"><div class="t">Planilha (.csv)</div>
          <div class="s">Abre no Numbers, Excel ou Google Sheets</div></div></button>
        <div class="exp-tip">💡 <b>Dica:</b> salve o .txt no app Arquivos (iCloud Drive) para ter backup em todos os seus aparelhos. O .csv abre no Numbers já em colunas.</div>
      </div>`;
    }
    h+=`</div>`;
  }

  /* history */
  h+=`<div class="mt26"><div class="lbl">Histórico de Treinos</div>`;
  if(!S.hist.length){h+=`<div class="empty">Nenhum treino salvo ainda.</div>`;}
  else{
    [...S.hist].sort((a,b)=>b.ts-a.ts).forEach(s=>{
      const dt=s.date?s.date.split("-").reverse().join("/").slice(0,5):"—";
      const dn=DAYS[s.day]?.lb||s.day;
      const entries=(s.entries||[]).filter(e=>e.sets?.some(x=>x.kg||x.reps)||e.rpe);
      h+=`<div class="hist-item"><div class="head">
        <span class="dt">${dt}</span><span class="tag">${dn}</span>
        <button class="del" onclick="delHist(${s.ts})">×</button></div>`;
      entries.forEach(en=>{
        h+=`<div class="hist-ex"><div class="nm">${esc(en.name)}</div><div class="hist-sets">`;
        (en.sets||[]).forEach((st,si)=>{
          const ok=!!(st.kg||st.reps);
          h+=`<span class="chip ${ok?"on":""}">${si+1} ${st.kg?esc(st.kg)+"kg":"—"}×${esc(st.reps||"—")}</span>`;
        });
        h+=`</div>${en.rpe?`<div class="rpe">RPE ${esc(en.rpe)}</div>`:""}</div>`;
      });
      h+=`</div>`;
    });
  }
  h+=`</div>`;
  return h;
}

function renderRM(){
  let h="";
  const rmv=getRmVal(S.rmLift);
  const sug=[rmv>0?r25(rmv*0.90):null,rmv>0?r25(rmv*0.95):null,rmv>0?r25(rmv)+2.5:null];
  const rmWuSteps=[{lb:"Barra",kg:20,reps:"10"},{pct:50,reps:"5"},{pct:65,reps:"3"},{pct:75,reps:"2"},{pct:85,reps:"1"},{pct:92,reps:"1"}];

  h+=`<div class="warn-box mb14"><div class="t">⚠️ Protocolo de Teste 1RM</div>
    <div class="s">Descanse 2–3 dias antes de testar. Teste <b>1 lift por dia</b> com pelo menos 1 dia de folga entre cada um.</div></div>`;

  /* lift selector */
  h+=`<div class="mb14"><div class="lbl">Lift a testar</div><div class="lift-grid">`;
  [["squat","🏋️ Squat"],["bench","🤜 Bench"],["dead","⬆️ Dead"]].forEach(([l,lbl])=>{
    h+=`<button class="${S.rmLift===l?"on":""}" onclick="setRmLift('${l}')">${lbl}</button>`;
  });
  h+=`</div></div>`;

  /* date */
  h+=`<div class="date-row mb12"><label>📅 Data</label>
    <input type="date" value="${S.rmDate}" onchange="S.rmDate=this.value"></div>`;

  /* warmup */
  h+=`<div class="collapse mb14 ${S.rmWuOpen?"open":""}">
    <div class="head" onclick="S.rmWuOpen=!S.rmWuOpen;render()">
      <span class="ct">🔥 Aquecimento para Teste</span><span class="arr">▼</span></div>`;
  if(S.rmWuOpen){
    h+=`<div class="body"><div class="wu-grp">${LIFT_NAMES[S.rmLift]}</div>`;
    rmWuSteps.forEach((s,i)=>{
      const kg=s.kg!==undefined?s.kg:(rmv>0?r25(rmv*s.pct/100):null);
      h+=`<div class="wu-step"><span class="n">${i+1}ª</span>
        <span class="kg">${kg!==null?kg+"kg":"—"}</span>
        <span class="rp">× ${s.reps}</span><span class="pc">${s.lb||s.pct+"%"}</span></div>`;
    });
    h+=`<div style="margin-top:7px;background:rgba(232,165,52,.08);border:1px solid var(--goldD);border-radius:7px;padding:8px 10px;font-size:11px;color:var(--dim);line-height:1.4">Descanse <b>3–5 min</b> entre aquecimentos. Após o último, descanse <b>5 min</b> antes da 1ª tentativa.</div></div>`;
  }
  h+=`</div>`;

  /* attempts */
  h+=`<div class="att-box mb14"><div class="h">🏆 Tentativas — ${LIFT_NAMES[S.rmLift]}</div>
    <div class="att-head"><span></span><span>Carga (kg ou texto)</span><span>Resultado</span></div>`;
  const labels=["1ª Abertura","2ª Tentativa","3ª (PR)"];
  const colors=["var(--blue)","var(--gold)","var(--purple)"];
  S.attempts.forEach((a,i)=>{
    const cls=a.ok===true?"ok":a.ok===false?"fail":"";
    h+=`<div class="att-row">
      <div class="lab"><span class="l" style="color:${colors[i]}">${labels[i]}</span>
        ${sug[i]?`<span class="sug">~${sug[i]}kg</span>`:""}</div>
      <div class="cell ${cls}"><input type="text" inputmode="decimal" placeholder="${sug[i]||"kg"}" value="${esc(a.kg)}"
        oninput="onAttInput(${i},this.value)"></div>
      <div class="res">
        <button class="${a.ok===true?"ok":""}" onclick="toggleOk(${i},true)">✓</button>
        <button class="${a.ok===false?"fail":""}" onclick="toggleOk(${i},false)">✗</button>
      </div></div>`;
  });
  h+=`<div class="att-tip">Descanse <b>4–5 min</b> entre tentativas. ✓ = subiu limpo · ✗ = falhou</div></div>`;

  h+=`<button id="rmSaveBtn" class="rm-save-btn" onclick="doRmSave()">Salvar Resultado do Teste</button>
    <div class="rm-save-note">O 1RM será atualizado automaticamente com o melhor resultado ✓</div>`;

  /* rm history */
  h+=`<div class="mt26"><div class="lbl">Histórico de Testes 1RM</div>`;
  if(!S.rmHist.length){h+=`<div class="empty">Nenhum teste salvo ainda.</div>`;}
  else{
    [...S.rmHist].sort((a,b)=>b.ts-a.ts).forEach(s=>{
      const dt=s.date?s.date.split("-").reverse().join("/").slice(0,5):"—";
      h+=`<div class="hist-item"><div class="head">
        <span class="dt">${dt}</span><span class="tag rm">${LIFT_NAMES[s.lift]}</span>
        ${s.bestKg?`<span class="best">✓ ${s.bestKg}kg</span>`:""}
        <button class="del" onclick="delRmHist(${s.ts})">×</button></div>
        <div class="hist-sets">`;
      (s.attempts||[]).forEach((a,i)=>{
        if(!a.kg)return;
        const ok=a.ok===true,fail=a.ok===false;
        const col=ok?"var(--green)":fail?"var(--red)":"var(--dim)";
        h+=`<span class="chip" style="border-color:${col};color:${col}">${i+1}ª ${esc(a.kg)}kg ${ok?"✓":fail?"✗":""}</span>`;
      });
      h+=`</div></div>`;
    });
  }
  h+=`</div>`;
  return h;
}

/* ═══════════════════════════════════════════════════════════
   SETTERS (re-render quando precisa)
   ═══════════════════════════════════════════════════════════ */
function setMode(m){S.mode=m;render();}
function setDay(k){S.day=k;S.openS={};S.wuOpen=false;S.log={};render();}
function setPhase(k){S.phase=k;render();}
function setSub(id,name){S.subs[id]=name;S.openS[id]=false;persist();render();}
function setRmLift(l){S.rmLift=l;S.attempts=[{kg:"",ok:null},{kg:"",ok:null},{kg:"",ok:null}];S.rmUpdated=null;render();}
function toggleOk(i,val){S.attempts[i].ok=S.attempts[i].ok===val?null:val;render();}
function toggleTimer(exId,si,secs){
  if(timerData&&timerData.exId===exId&&timerData.si===si)stopTimer();
  else startTimer(exId,si,secs);
}

/* INIT */
render();
</script>
</body>
</html>
