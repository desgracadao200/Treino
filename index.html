<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Treino — Powerlifting</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;}
body{background:#0c0c0e;color:#f2f0ea;font-family:'Oswald',sans-serif;min-height:100vh;}
#root{max-width:520px;margin:0 auto;padding:0 13px 70px;}
button{font-family:'Oswald',sans-serif;touch-action:manipulation;-webkit-tap-highlight-color:transparent;cursor:pointer;border:none;outline:none;}
input{font-family:'JetBrains Mono',monospace;touch-action:manipulation;outline:none;border:none;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const PROG = {
  squat:{
    heavy:{acum:{pct:75,sets:4,reps:5,rpe:"7"},int1:{pct:80,sets:4,reps:4,rpe:"7-8"},int2:{pct:83,sets:4,reps:3,rpe:"8"},pico:{pct:88,sets:4,reps:2,rpe:"8-9"},deload:{pct:62,sets:3,reps:5,rpe:"6"},reinicio:{pct:77,sets:4,reps:5,rpe:"7"}},
    volume:{pct:72,sets:4,reps:4,rpe:"7"}
  },
  bench:{
    heavy:{acum:{pct:75,sets:4,reps:5,rpe:"7"},int1:{pct:80,sets:4,reps:4,rpe:"7-8"},int2:{pct:83,sets:4,reps:3,rpe:"8"},pico:{pct:88,sets:4,reps:2,rpe:"8-9"},deload:{pct:62,sets:3,reps:5,rpe:"6"},reinicio:{pct:77,sets:4,reps:5,rpe:"7"}},
    volume:{pct:73,sets:5,reps:5,rpe:"7"}
  },
  dead:{
    heavy:{acum:{pct:75,sets:3,reps:4,rpe:"7"},int1:{pct:80,sets:3,reps:3,rpe:"7-8"},int2:{pct:83,sets:3,reps:3,rpe:"8"},pico:{pct:87,sets:3,reps:2,rpe:"8-9"},deload:{pct:62,sets:2,reps:4,rpe:"6"},reinicio:{pct:77,sets:3,reps:4,rpe:"7"}}
  }
};

const WU={
  ter:[{lift:"squat",title:"Agachamento",steps:[{lb:"Barra",kg:20,reps:"8"},{pct:40,reps:"5"},{pct:55,reps:"3"},{pct:70,reps:"2"},{pct:85,reps:"1"}]}],
  qui:[{lift:"bench",title:"Supino",steps:[{lb:"Barra",kg:20,reps:"10"},{pct:40,reps:"8"},{pct:60,reps:"5"},{pct:70,reps:"2"}]}],
  sex:[{lift:"squat",title:"Agach. Pausa",note:"pausa 2s",steps:[{lb:"Barra",kg:20,reps:"8"},{pct:40,reps:"5"},{pct:55,reps:"3"},{pct:68,reps:"2"}]}],
  sab:[
    {lift:"bench",title:"Supino",steps:[{lb:"Barra",kg:20,reps:"10"},{pct:40,reps:"8"},{pct:60,reps:"5"},{pct:75,reps:"2"},{pct:85,reps:"1"}]},
    {lift:"dead",title:"Terra",steps:[{lb:"Barra",kg:20,reps:"5"},{pct:40,reps:"5"},{pct:60,reps:"3"},{pct:75,reps:"2"},{pct:85,reps:"1"}]}
  ]
};

const DAYS={
  ter:{lb:"Terça",title:"Heavy Lower",sub:"Agachamento pesado + posterior",cls:"heavy",ex:[
    {id:"t1",name:"Agachamento (pesado)",main:{lift:"squat",dt:"heavy"},subs:["Hack squat","High bar","Smith"]},
    {id:"t2",name:"Agachamento pausa (2s)",sets:3,reps:3,rpe:"7",subs:["Box squat","Frontal","Smith pausa"]},
    {id:"t3",name:"Stiff / RDL",sets:3,reps:"6-8",rpe:"7-8",subs:["Good morning","Mesa flexora","RDL halteres"]},
    {id:"t4",name:"Cadeira flexora / Nordic",sets:3,reps:"8-10",rpe:"8",subs:["Mesa flexora","Leg curl","Nordic assistido"]},
    {id:"t5",name:"Abdômen (prancha)",sets:3,reps:"30s",rpe:"7",subs:["Ab wheel","Elevação de pernas","Prancha lateral"]},
  ]},
  qua:{lb:"Quarta",title:"Recuperação",sub:"Cardio leve + mobilidade",cls:"rec",recovery:true,ex:[
    {rt:"Cardio leve — esteira ou bike",rs:"20–30 min · FC 120–140 bpm"},
    {rt:"Mobilidade — quadril, tornozelo, ombro",rs:"10 min no que estiver mais travado"},
    {rt:"Prancha (opcional)",rs:"3 × 30–45s"},
  ]},
  qui:{lb:"Quinta",title:"Volume Upper",sub:"Supino volume + acessórios",cls:"volume",ex:[
    {id:"q1",name:"Supino reto (volume)",main:{lift:"bench",dt:"volume"},subs:["Supino máquina","Supino halteres","Smith"]},
    {id:"q2",name:"Supino fechado",sets:3,reps:"6-8",rpe:"8",subs:["Supino fechado Smith","Mergulho","Tríceps testa"]},
    {id:"q3",name:"Remada barra T / apoiada",sets:4,reps:"8-10",rpe:"8",subs:["Remada cavalinho","Remada máquina","Remada halter","Puxada"]},
    {id:"q4",name:"Desenvolvimento halteres",sets:3,reps:"8-10",rpe:"8",subs:["Desenvolvimento máquina","Militar barra","Arnold press"]},
    {id:"q5",name:"Tríceps overhead",sets:3,reps:"10-12",rpe:"9",subs:["Tríceps corda","Tríceps francês","Mergulho"]},
    {id:"q6",name:"Face pull",sets:3,reps:"15-20",rpe:"7",subs:["Crucifixo invertido","Band pull-apart","Peck-deck"]},
  ]},
  sex:{lb:"Sexta",title:"Volume Lower",sub:"Agachamento pausa + acessórios",cls:"volume",ex:[
    {id:"s1",name:"Agachamento pausa (volume)",main:{lift:"squat",dt:"volume"},subs:["Box squat","High bar","Smith"]},
    {id:"s2",name:"Bloco pull / Terra leve",sets:3,reps:5,rpe:"7",subs:["Rack pull","Terra leve","RDL"]},
    {id:"s3",name:"Leg press 45°",sets:3,reps:"8-10",rpe:"8",subs:["Hack squat","Agachamento","Afundo","Leg press horizontal"]},
    {id:"s4",name:"Hyperextension",sets:3,reps:"10-12",rpe:"8",subs:["Good morning","Stiff","Banco romano"]},
    {id:"s5",name:"Abdômen",sets:3,reps:15,rpe:"7",subs:["Prancha","Rotação russa","Ab wheel"]},
  ]},
  sab:{lb:"Sáb",title:"Heavy Upper + Terra",sub:"Supino pesado + Terra pesado",cls:"heavy",ex:[
    {id:"sb1",name:"Supino reto (pesado)",main:{lift:"bench",dt:"heavy"},subs:["Supino máquina","Supino halteres","Smith"]},
    {id:"sb2",name:"Terra convencional (pesado)",main:{lift:"dead",dt:"heavy"},subs:["Terra sumô","Pegada mista"]},
    {id:"sb3",name:"Remada curvada barra",sets:3,reps:"5-6",rpe:"7-8",subs:["Remada máquina","Remada cavalinho","Remada halter"]},
    {id:"sb4",name:"Tríceps mergulho / JM Press",sets:3,reps:"6-8",rpe:"8",subs:["Tríceps corda","Tríceps testa","Supino fechado"]},
    {id:"sb5",name:"Bíceps + antebraço",sets:3,reps:"10-12",rpe:"9",subs:["Rosca direta","Rosca alternada","Rosca martelo","Farmer carry"]},
  ]}
};

const DAY_K=["ter","qua","qui","sex","sab"];
const PH_K=["acum","int1","int2","pico","deload","reinicio"];
const PH_LBL={acum:"Acumul.",int1:"Intens.",int2:"Intens.",pico:"Pico",deload:"Deload",reinicio:"Reinício"};
const PH_WK={acum:"Sem 1",int1:"Sem 2",int2:"Sem 3",pico:"Sem 4",deload:"Sem 5",reinicio:"Sem 6"};
const RM_K={squat:"sq",bench:"bn",dead:"dl"};
const LIFT_NAMES={squat:"Agachamento",bench:"Supino",dead:"Terra"};
const METAS={
  squat:{atual:102.5,recomp:117.5,cheia:130,blocos:[106,110,114,117.5]},
  bench:{atual:85,recomp:91.5,cheia:100,blocos:[87,89,90.5,91.5]},
  dead:{atual:195,recomp:207.5,cheia:217.5,blocos:[199,202,205,207.5]}
};

const C={bg:"#0c0c0e",bg2:"#141418",card:"#1a1a20",card2:"#22222a",line:"#2e2e38",gold:"#e8a534",goldD:"#a8761f",red:"#d6493b",blue:"#4d83c4",green:"#5aa55f",purple:"#7c5cbf",txt:"#f2f0ea",dim:"#8c8a85",faint:"#5a5852"};
const mono="'JetBrains Mono',monospace";
const ui="'Oswald',sans-serif";

function r25(x){return Math.round(x/2.5)*2.5;}
function B(extra){return{fontFamily:ui,touchAction:"manipulation",WebkitTapHighlightColor:"transparent",cursor:"pointer",border:"none",outline:"none",...extra};}

function ls(k){try{return JSON.parse(localStorage.getItem(k));}catch(e){return null;}}
function lss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

function App(){
  const[rm,setRm]=useState(()=>ls("pl7_rm")||{sq:"102.5",bn:"85",dl:"195"});
  const[mode,setMode]=useState("treino");
  const[day,setDay]=useState("ter");
  const[phase,setPhase]=useState("acum");
  const[subs,setSubs]=useState(()=>ls("pl7_sb")||{});
  const[openS,setOpenS]=useState({});
  const[wuOpen,setWuOpen]=useState(false);
  const[log,setLog]=useState({});
  const[date,setDate]=useState(new Date().toISOString().slice(0,10));
  const[hist,setHist]=useState(()=>ls("pl7_ss")||[]);
  const[saveS,setSaveS]=useState("idle");
  const[rmLift,setRmLift]=useState("squat");
  const[rmDate,setRmDate]=useState(new Date().toISOString().slice(0,10));
  const[rmWuOpen,setRmWuOpen]=useState(false);
  const[attempts,setAttempts]=useState([{kg:"",ok:null},{kg:"",ok:null},{kg:"",ok:null}]);
  const[rmHist,setRmHist]=useState(()=>ls("pl7_rh")||[]);
  const[rmSaveS,setRmSaveS]=useState("idle");
  const[rmUpdated,setRmUpdated]=useState(null);

  function getRmVal(lift){const v=parseFloat(rm[RM_K[lift]]);return isNaN(v)?0:v;}
  function comp(lift,dt){
    const rmv=getRmVal(lift);
    const cfg=dt==="heavy"?PROG[lift]?.heavy?.[phase]:PROG[lift]?.volume;
    if(!cfg)return null;
    return{...cfg,kg:rmv>0?r25(rmv*cfg.pct/100):null,exact:rmv>0?(rmv*cfg.pct/100).toFixed(1):null,fixed:dt==="volume"};
  }
  function numSets(e){if(e.main){const m=comp(e.main.lift,e.main.dt);return m?m.sets:3;}return e.sets||3;}
  function tReps(e){if(e.main){const m=comp(e.main.lift,e.main.dt);return m?m.reps:"-";}return e.reps||"-";}
  function getSet(exId,si){const d=log[exId];return d?.sets?.[si]||{kg:"",reps:""};}
  function getRpeVal(exId){return log[exId]?.rpe||"";}
  function setSetVal(exId,si,field,val){
    setLog(p=>{const d={...p[exId]||{sets:[],rpe:""}};const sets=[...d.sets||[]];
      while(sets.length<=si)sets.push({kg:"",reps:""});
      sets[si]={...sets[si],[field]:val};return{...p,[exId]:{...d,sets}};});
  }
  function setRpeVal2(exId,val){setLog(p=>({...p,[exId]:{...p[exId]||{sets:[],rpe:""},rpe:val}}));}

  function saveRM(v){lss("pl7_rm",v);}
  function saveSB(v){lss("pl7_sb",v);}
  function saveSS(v){lss("pl7_ss",v);}
  function saveRH(v){lss("pl7_rh",v);}

  function chDay(d){setDay(d);setOpenS({});setWuOpen(false);setLog({});}
  function togSub(id){setOpenS(p=>({...p,[id]:!p[id]}));}
  function chSub(id,name){const n={...subs,[id]:name};setSubs(n);saveSB(n);setOpenS(p=>({...p,[id]:false}));}

  function doSave(){
    const d=DAYS[day];
    if(d.recovery){flash(setSaveS,"rec");return;}
    if(!date){flash(setSaveS,"err");return;}
    const entries=(d.ex||[]).map(e=>{
      const ns=numSets(e),ld=log[e.id]||{sets:[],rpe:""};
      return{name:subs[e.id]||e.name,sets:Array.from({length:ns},(_,i)=>ld.sets?.[i]||{kg:"",reps:""}),rpe:ld.rpe||""};
    });
    const next=[...hist,{ts:Date.now(),date,day,phase,entries}];
    setHist(next);saveSS(next);setLog({});flash(setSaveS,"done");
  }

  function doRmSave(){
    if(!rmDate){flash(setRmSaveS,"err");return;}
    const bestOk=attempts.reduce((best,a)=>{
      if(a.ok===true&&parseFloat(a.kg)>0){const v=parseFloat(a.kg);return v>best?v:best;}
      return best;
    },0);
    const entry={ts:Date.now(),date:rmDate,lift:rmLift,attempts:[...attempts],bestKg:bestOk||null};
    const next=[...rmHist,entry];
    setRmHist(next);saveRH(next);
    if(bestOk>0){
      const key=RM_K[rmLift];
      const newRm={...rm,[key]:String(bestOk)};
      setRm(newRm);saveRM(newRm);
      setRmUpdated(bestOk);
    }
    flash(setRmSaveS,"done");
  }

  function flash(setter,t){setter(t);setTimeout(()=>setter("idle"),2000);}
  function delHist(ts){const n=hist.filter(s=>s.ts!==ts);setHist(n);saveSS(n);}
  function delRmHist(ts){const n=rmHist.filter(s=>s.ts!==ts);setRmHist(n);saveRH(n);}
  function setAttempt(i,field,val){setAttempts(p=>{const n=[...p];n[i]={...n[i],[field]:val};return n;});}
  function toggleOk(i,val){setAttempts(p=>{const n=[...p];n[i]={...n[i],ok:n[i].ok===val?null:val};return n;});}

  const d=DAYS[day];
  const hasH=!d.recovery&&d.ex.some(e=>e.main?.dt==="heavy");
  const wubs=WU[day]||[];
  const rmv=getRmVal(rmLift);
  const suggestions=[rmv>0?r25(rmv*0.90):null,rmv>0?r25(rmv*0.95):null,rmv>0?r25(rmv*1.00)+2.5:null];
  const rmWuSteps=[{lb:"Barra",kg:20,reps:"10"},{pct:50,reps:"5"},{pct:65,reps:"3"},{pct:75,reps:"2"},{pct:85,reps:"1"},{pct:92,reps:"1"}];

  const saveLbl=saveS==="done"?"✓ Salvo!":saveS==="err"?"Preencha a data!":saveS==="rec"?"Dia de recuperação":"Salvar Treino";
  const saveBg=saveS==="done"?C.green:saveS!=="idle"?C.red:C.gold;
  const rmSaveLbl=rmSaveS==="done"?"✓ Resultado Salvo!":rmSaveS==="err"?"Preencha a data!":"Salvar Resultado";
  const rmSaveBg=rmSaveS==="done"?C.green:rmSaveS!=="idle"?C.red:C.purple;
  const bannerBL={heavy:C.red,volume:C.blue,rec:C.green}[d.cls]||C.gold;

  const Lbl=({c})=>(
    <div style={{fontSize:10,letterSpacing:3,textTransform:"uppercase",color:C.dim,fontWeight:500,marginBottom:8,display:"flex",alignItems:"center",gap:7,fontFamily:ui}}>
      <span style={{width:14,height:2,background:C.gold,flexShrink:0,display:"block"}}/>
      <span>{c}</span>
    </div>
  );

  const WuBlock=({blocks})=>(
    <div style={{background:C.bg2,border:`1px solid ${C.line}`,borderRadius:11,marginBottom:10,overflow:"hidden"}}>
      <div onClick={()=>setWuOpen(p=>!p)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:13,minHeight:48,cursor:"pointer",touchAction:"manipulation",WebkitTapHighlightColor:"transparent"}}>
        <span style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:C.gold,fontWeight:500}}>🔥 Aquecimento</span>
        <span style={{color:C.dim,fontSize:12,transition:"transform .2s",transform:wuOpen?"rotate(180deg)":"none",display:"inline-block"}}>▼</span>
      </div>
      {wuOpen&&(
        <div style={{padding:"0 13px 12px"}}>
          {blocks.map((blk,bi)=>{
            const rv=getRmVal(blk.lift);
            return(<div key={bi}>
              <div style={{fontSize:10,color:C.dim,textTransform:"uppercase",letterSpacing:".8px",margin:"9px 0 5px",fontWeight:500}}>
                {blk.title}{blk.note&&<span style={{color:C.faint,fontSize:9,marginLeft:5,textTransform:"none",letterSpacing:0}}>({blk.note})</span>}
              </div>
              {blk.steps.map((s,si)=>{
                const kg=s.kg!==undefined?s.kg:(rv>0?r25(rv*s.pct/100):null);
                return(<div key={si} style={{display:"flex",alignItems:"center",gap:9,padding:"7px 9px",background:C.card,borderRadius:7,marginBottom:4,border:`1px solid ${C.line}`}}>
                  <span style={{fontFamily:mono,fontSize:10,color:C.faint,minWidth:18}}>{si+1}ª</span>
                  <span style={{fontFamily:mono,fontWeight:800,fontSize:18,color:C.gold,minWidth:55}}>{kg!==null?kg+"kg":"—"}</span>
                  <span style={{fontFamily:mono,fontWeight:700,fontSize:12,color:C.txt}}>× {s.reps}</span>
                  <span style={{fontSize:10,color:C.faint,marginLeft:"auto"}}>{s.lb||s.pct+"%"}</span>
                </div>);
              })}
            </div>);
          })}
          <div style={{fontSize:10,color:C.faint,marginTop:5,lineHeight:1.4}}>Arredonde 1–2kg conforme as anilhas.</div>
        </div>
      )}
    </div>
  );

  const ExCard=({e})=>{
    const nm=subs[e.id]||e.name,isM=!!e.main,md=isM?comp(e.main.lift,e.main.dt):null;
    const so=!!openS[e.id],cs=subs[e.id]||e.name,ns=numSets(e),tr=tReps(e);
    return(
      <div style={{background:isM?`linear-gradient(145deg,${C.card2},${C.card})`:C.card,border:`1px solid ${isM?C.goldD:C.line}`,borderRadius:11,padding:"12px 13px",marginBottom:9}}>
        <div style={{fontSize:15,fontWeight:600,lineHeight:1.2,marginBottom:3}}>{nm}</div>
        <span style={{fontSize:9,fontWeight:600,letterSpacing:".8px",textTransform:"uppercase",padding:"2px 6px",borderRadius:4,display:"inline-block",background:isM?"rgba(232,165,52,.15)":"rgba(140,138,133,.15)",color:isM?C.gold:C.dim}}>{isM?"Principal":"Acessório"}</span>
        {isM&&md?(
          <>
            <div style={{display:"flex",gap:12,marginTop:8,flexWrap:"wrap",alignItems:"baseline"}}>
              {md.kg!==null&&<span><span style={{fontFamily:mono,fontWeight:800,fontSize:26,color:C.gold,lineHeight:1}}>{md.kg}</span><span style={{fontSize:12,color:C.dim}}> kg</span></span>}
              <span style={{fontFamily:mono,fontWeight:700,fontSize:17,color:C.txt}}>{md.sets}×{md.reps}</span>
              <span style={{fontSize:12,color:C.dim}}>RPE {md.rpe}</span>
            </div>
            <div style={{fontFamily:mono,fontSize:10,color:C.faint,marginTop:2}}>{md.kg!==null?`${md.pct}% do 1RM · exato ${md.exact}kg`:"Preencha o 1RM acima"}</div>
            {md.fixed&&<div style={{fontSize:11,color:C.gold,marginTop:3}}>Volume — carga fixa, dupla progressão</div>}
          </>
        ):!isM&&(
          <div style={{display:"flex",gap:12,marginTop:8,alignItems:"baseline"}}>
            <span style={{fontFamily:mono,fontWeight:700,fontSize:17,color:C.txt}}>{e.sets}×{e.reps}</span>
            <span style={{fontSize:12,color:C.dim}}>RPE {e.rpe}</span>
          </div>
        )}
        {e.subs?.length>0&&(
          <>
            <button onClick={()=>togSub(e.id)} style={B({marginTop:9,fontSize:11,color:C.blue,border:`1px dashed ${C.line}`,padding:"8px 10px",borderRadius:7,display:"inline-flex",alignItems:"center",gap:4,background:"transparent",minHeight:40})}>🔄 Trocar (sem máquina?)</button>
            {so&&(<div style={{marginTop:7,display:"flex",flexWrap:"wrap",gap:5}}>
              {[e.name,...e.subs].map(sn=>(
                <button key={sn} onClick={()=>chSub(e.id,sn)} style={B({background:cs===sn?"rgba(77,131,196,.12)":C.bg2,border:`1px solid ${cs===sn?C.blue:C.line}`,color:cs===sn?C.blue:C.dim,fontSize:11,padding:"8px 10px",borderRadius:7,minHeight:38})}>{sn}</button>
              ))}
            </div>)}
          </>
        )}
        <div style={{marginTop:11,paddingTop:11,borderTop:`1px solid ${C.line}`}}>
          <div style={{display:"grid",gridTemplateColumns:"30px 1fr 1fr",gap:6,marginBottom:5}}>
            {["Série","Carga (kg)","Reps feitas"].map(h=><span key={h} style={{fontSize:9,letterSpacing:.5,textTransform:"uppercase",color:C.faint,textAlign:"center",fontFamily:ui}}>{h}</span>)}
          </div>
          {Array.from({length:ns},(_,si)=>{
            const s=getSet(e.id,si);
            return(<div key={si} style={{display:"grid",gridTemplateColumns:"30px 1fr 1fr",gap:6,marginBottom:5,alignItems:"center"}}>
              <div style={{fontFamily:mono,fontSize:12,fontWeight:700,color:C.dim,textAlign:"center",background:C.bg2,border:`1px solid ${C.line}`,borderRadius:6,height:40,display:"flex",alignItems:"center",justifyContent:"center"}}>{si+1}</div>
              <div style={{background:C.bg2,border:`1px solid ${C.line}`,borderRadius:7,height:40,display:"flex",alignItems:"center",padding:"0 8px"}}>
                <input type="number" inputMode="decimal" placeholder="kg" value={s.kg} onChange={ev=>setSetVal(e.id,si,"kg",ev.target.value)} style={{width:"100%",background:"transparent",color:C.gold,fontFamily:mono,fontWeight:700,fontSize:15,textAlign:"center",touchAction:"manipulation"}}/>
              </div>
              <div style={{background:C.bg2,border:`1px solid ${C.line}`,borderRadius:7,height:40,display:"flex",alignItems:"center",padding:"0 8px"}}>
                <input type="number" inputMode="decimal" placeholder={String(tr)} value={s.reps} onChange={ev=>setSetVal(e.id,si,"reps",ev.target.value)} style={{width:"100%",background:"transparent",color:C.txt,fontFamily:mono,fontWeight:700,fontSize:15,textAlign:"center",touchAction:"manipulation"}}/>
              </div>
            </div>);
          })}

          const totalInicial=102.5+85+195;
          const prog=Math.max(0,Math.min(100,((totalAtual-totalInicial)/(totalMeta-totalInicial))*100));
          return(<div style={{background:`linear-gradient(145deg,${C.card2},${C.card})`,border:`1px solid ${C.goldD}`,borderRadius:11,padding:"14px 13px",marginBottom:11}}>
            <div style={{fontSize:13,letterSpacing:1.5,textTransform:"uppercase",color:C.gold,fontWeight:600,marginBottom:10,textAlign:"center"}}>Total dos 3 Lifts</div>
            <div style={{textAlign:"center",marginBottom:10}}>
              <span style={{fontFamily:mono,fontSize:32,fontWeight:800,color:C.gold}}>{totalAtual.toFixed(1)}</span>
              <span style={{fontFamily:mono,fontSize:16,color:C.dim}}> / {totalMeta}kg</span>
            </div>
            <div style={{position:"relative",height:24,background:C.bg2,borderRadius:12,overflow:"hidden",border:`1px solid ${C.line}`}}>
              <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${prog}%`,background:`linear-gradient(90deg,${C.goldD},${C.gold})`,borderRadius:12,transition:"width .4s",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <span style={{fontFamily:mono,fontSize:11,fontWeight:700,color:"#1a1208"}}>{prog.toFixed(0)}%</span>
              </div>
            </div>
            <div style={{textAlign:"center",marginTop:8,fontSize:11,color:C.dim}}>
              Ganho total: <b style={{color:C.gold}}>+{(totalAtual-totalInicial).toFixed(1)}kg</b> · Falta <b style={{color:C.txt}}>{(totalMeta-totalAtual).toFixed(1)}kg</b>
            </div>
          </div>);
        })()}
        <div style={{background:"rgba(214,73,59,.08)",border:`1px dashed ${C.red}`,borderRadius:9,padding:"11px 13px",fontSize:11,color:C.dim,lineHeight:1.5}}>
          <b style={{color:C.gold}}>Lembrete honesto:</b> na recomposição os ganhos são mais lentos. Meta de recomp (Dez) é o sucesso esperado mantendo 93kg. Se travar 2 blocos seguidos, ganhar 2-3kg destrava.
        </div>
      </>)}

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
